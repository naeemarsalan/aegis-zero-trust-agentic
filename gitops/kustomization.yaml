apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# This kustomization renders the hub-side GitOps bootstrap resources.
# It does NOT include applications/ (that path is sourced directly by ArgoCD
# as the app-of-apps source).

resources:
  - projects/nvidia-ida-appproject.yaml
  - acm-registration
  - app-of-apps.yaml
