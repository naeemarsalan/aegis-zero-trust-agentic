apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# This kustomization renders the hub-side GitOps bootstrap resources.
# It does NOT include applications/ (that path is sourced directly by ArgoCD
# as the app-of-apps source).

resources:
  - projects/nvidia-ida-appproject.yaml
  - app-of-apps.yaml
  # acm-registration/ emits GitOpsCluster + Placement + ManagedClusterSetBinding,
  # whose ACM CRDs are ABSENT on a self-managed cluster — applying them there fails.
  # The proven model on ocp-dev is self-managed (apps target https://kubernetes.default.svc),
  # so it is OMITTED from the default build.
  # ACM-hub deployers: uncomment the line below, or build it separately with
  #   kustomize build gitops/acm-registration
  # - acm-registration
