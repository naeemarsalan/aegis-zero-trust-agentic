apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: nvidia-ida-placement
  namespace: openshift-gitops
spec:
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchLabels:
            # ACM labels the managed cluster with its name
            name: anaeem
  clusterSets:
    - default
