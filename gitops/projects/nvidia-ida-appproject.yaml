apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: nvidia-ida
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  description: >
    Project for all nvidia-ida PoC platform components deployed to the anaeem
    SNO cluster, managed from the virt ACM hub ArgoCD instance.

  sourceRepos:
    - https://git.arsalan.io/anaeem/nvidia-ida.git

  destinations:
    # ocp-dev: self-managed GitOps — all platform components deploy in-cluster.
    # Namespace-wildcard is acceptable for this PoC; the resource whitelists
    # below already permit all cluster- and namespace-scoped kinds.
    - server: https://kubernetes.default.svc
      namespace: '*'

  clusterResourceWhitelist:
    - group: "*"
      kind: "*"

  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

  roles:
    - name: read-only
      description: Read-only access for auditors
      policies:
        - p, proj:nvidia-ida:read-only, applications, get, nvidia-ida/*, allow
      groups: []
