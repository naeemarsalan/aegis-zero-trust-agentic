apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nvidia-ida-showroom
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: nvidia-ida

  source:
    repoURL: https://git.arsalan.io/anaeem/nvidia-ida.git
    targetRevision: fix/jit-approver-mint-route
    path: services/showroom/deploy/overlays/virt

  destination:
    # Docs site runs on the virt hub itself, alongside RHOAI demo assets
    server: https://kubernetes.default.svc
    namespace: rhoai-agentic

  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
