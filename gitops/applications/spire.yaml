apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nvidia-ida-spire
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: nvidia-ida

  source:
    repoURL: https://git.arsalan.io/anaeem/nvidia-ida.git
    targetRevision: main
    path: platform/spire/overlays/anaeem

  destination:
    server: https://api.anaeem.na-launch.com:6443
    namespace: zero-trust-workload-identity-manager

  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
