apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nvidia-ida-jit-approver
  namespace: openshift-gitops
  annotations:
    # wave 5: alongside ext-proc-delegation (shares the mcp-gateway namespace + Vault/SPIRE deps).
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: nvidia-ida

  source:
    repoURL: https://git.arsalan.io/anaeem/nvidia-ida.git
    targetRevision: fix/jit-approver-mint-route
    path: services/jit-approver/deploy/overlays/anaeem

  destination:
    server: https://kubernetes.default.svc
    namespace: mcp-gateway

  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
