# EXAMPLE — credential-less MaaS brain config for the agent-harness.
#
# This is the CREDENTIAL-LESS replacement for inference-secret.example.yaml. The
# agent's reasoning LLM is reached THROUGH the SPIFFE-auth MaaS gateway; the
# agent authenticates with its OWN JWT-SVID (fetched fresh per request by the
# in-pod maas_brain_proxy), and holds NO model key. The upstream OpenRouter key
# is injected SERVER-SIDE by the MaaS llm-proxy from Vault.
#
# Flow:
#   claude CLI --(/v1/messages, throw-away token)--> 127.0.0.1:8787 maas_brain_proxy
#     --(strip token; inject FRESH SVID as Authorization: Bearer; map path
#        /v1/messages -> /openrouter/messages; Host: maas vhost)-->
#   maas-gateway-istio.maas.svc:80 (Authorino maas-spiffe-auth validates the SVID)
#     --> llm-proxy (injects Vault OpenRouter key) --> openrouter.ai/api/v1/messages
#
# The brain-entrypoint wrapper starts the proxy and points the CLI at it, so the
# ONLY env needed here is the model id + a NON-SECRET placeholder token (the CLI
# refuses to run without *some* token set; the proxy strips it). NOTE there is no
# real API key anywhere in this Secret — that is the whole point.
#
#   oc -n agent-sandbox create secret generic agent-harness-inference \
#     --from-literal=MAAS_BRAIN=1 \
#     --from-literal=MAAS_GATEWAY_URL=http://maas-gateway-istio.maas.svc:80 \
#     --from-literal=MAAS_GATEWAY_HOST=maas.apps.ocp-dev.na-launch.com \
#     --from-literal=MAAS_ROUTE_PREFIX=/openrouter \
#     --from-literal=ANTHROPIC_AUTH_TOKEN=svid-injected-by-local-proxy \
#     --from-literal=ANTHROPIC_API_KEY=svid-injected-by-local-proxy \
#     --from-literal=AGENT_MODEL=anthropic/claude-sonnet-4 \
#     --from-literal=ANTHROPIC_DEFAULT_SONNET_MODEL=anthropic/claude-sonnet-4 \
#     --from-literal=ANTHROPIC_DEFAULT_OPUS_MODEL=anthropic/claude-sonnet-4 \
#     --from-literal=ANTHROPIC_SMALL_FAST_MODEL=anthropic/claude-sonnet-4
#
# Premium tier (claude-opus via JIT capability) would target MAAS_ROUTE_PREFIX=
# /premium/openrouter and additionally require the proxy to attach an
# X-JIT-Capability header — out of scope for the standard reasoning path.
---
apiVersion: v1
kind: Secret
metadata:
  name: agent-harness-inference
  namespace: agent-sandbox
  labels:
    app.kubernetes.io/name: e2e-harness
    app.kubernetes.io/part-of: nvidia-ida
type: Opaque
stringData:
  MAAS_BRAIN: "1"
  MAAS_GATEWAY_URL: http://maas-gateway-istio.maas.svc:80
  MAAS_GATEWAY_HOST: maas.apps.ocp-dev.na-launch.com
  MAAS_ROUTE_PREFIX: /openrouter
  # NON-SECRET placeholder — stripped by the proxy; the SVID is the real auth.
  ANTHROPIC_AUTH_TOKEN: svid-injected-by-local-proxy
  ANTHROPIC_API_KEY: svid-injected-by-local-proxy
  AGENT_MODEL: anthropic/claude-sonnet-4
  ANTHROPIC_DEFAULT_SONNET_MODEL: anthropic/claude-sonnet-4
  ANTHROPIC_DEFAULT_OPUS_MODEL: anthropic/claude-sonnet-4
  ANTHROPIC_SMALL_FAST_MODEL: anthropic/claude-sonnet-4
