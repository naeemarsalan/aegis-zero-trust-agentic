# EXAMPLE ONLY — DO NOT COMMIT REAL VALUES.
#
# This file documents the shape of the `agent-harness-inference` Secret that the
# e2e-harness Deployment consumes (envFrom, optional: true). It configures the
# LLM the agent's claude-agent-sdk / claude CLI talks to. The CLI posts to
# {ANTHROPIC_BASE_URL}/v1/messages — so ANTHROPIC_BASE_URL must NOT include /v1
# (the SDK appends it).
#
# Current brain: a homelab LiteLLM proxy serving model `anthropic/claude-sonnet-4`
# (the only LiteLLM model that answers the Anthropic-native /v1/messages path;
# deepseek-* are passthrough-configured and 404 there). Reaching it requires the
# 4000/tcp egress rule in networkpolicy.yaml.
#
# NOTE: the LiteLLM base below is plaintext HTTP on the homelab LAN — fine for the
# demo, but the API key and all prompts/responses cross the wire unencrypted. Put
# LiteLLM behind TLS for any non-lab use.
#
# Create the real Secret out-of-band before (or after) deploying — the secretRef
# is optional, so the pod starts without it but the agent cannot call its LLM:
#
#   oc -n agent-sandbox create secret generic agent-harness-inference \
#     --from-literal=ANTHROPIC_BASE_URL=http://172.16.2.251:4000 \
#     --from-literal=ANTHROPIC_API_KEY=<LITELLM_VIRTUAL_KEY> \
#     --from-literal=ANTHROPIC_AUTH_TOKEN=<LITELLM_VIRTUAL_KEY> \
#     --from-literal=AGENT_MODEL=anthropic/claude-sonnet-4 \
#     --from-literal=ANTHROPIC_DEFAULT_SONNET_MODEL=anthropic/claude-sonnet-4 \
#     --from-literal=ANTHROPIC_DEFAULT_OPUS_MODEL=anthropic/claude-sonnet-4 \
#     --from-literal=ANTHROPIC_SMALL_FAST_MODEL=anthropic/claude-sonnet-4
#
# To revert to the OpenRouter brain instead, set ANTHROPIC_BASE_URL=https://openrouter.ai/api,
# the *_MODEL vars to the desired OpenRouter model ids, and the key to the sk-or-... token
# (OpenRouter is HTTPS:443, already covered by the broad egress rule — no NP change needed).
#
# This file is intentionally NOT listed in kustomization.yaml: a placeholder Secret
# applied by `apply -k` would clobber the real live credentials.
---
apiVersion: v1
kind: Secret
metadata:
  name: agent-harness-inference
  namespace: agent-sandbox
  labels:
    app.kubernetes.io/name: e2e-harness
    app.kubernetes.io/part-of: nvidia-ida
type: Opaque
stringData:
  ANTHROPIC_BASE_URL: http://172.16.2.251:4000
  ANTHROPIC_API_KEY: REPLACE_ME_LITELLM_VIRTUAL_KEY
  ANTHROPIC_AUTH_TOKEN: REPLACE_ME_LITELLM_VIRTUAL_KEY
  AGENT_MODEL: anthropic/claude-sonnet-4
  ANTHROPIC_DEFAULT_SONNET_MODEL: anthropic/claude-sonnet-4
  ANTHROPIC_DEFAULT_OPUS_MODEL: anthropic/claude-sonnet-4
  ANTHROPIC_SMALL_FAST_MODEL: anthropic/claude-sonnet-4
