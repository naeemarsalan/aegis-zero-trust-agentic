apiVersion: v1
kind: ServiceAccount
metadata:
  name: e2e-harness
  namespace: agent-sandbox
  labels:
    app.kubernetes.io/name: e2e-harness
    app.kubernetes.io/part-of: nvidia-ida
# automountServiceAccountToken: false is set here because the harness accesses
# the SPIFFE workload API exclusively via the csi.spiffe.io CSI volume — it does
# NOT call the Kubernetes API server at runtime. Disabling automount removes the
# default token from the pod's filesystem, eliminating one credential that could
# be stolen if the container is compromised.
automountServiceAccountToken: false
