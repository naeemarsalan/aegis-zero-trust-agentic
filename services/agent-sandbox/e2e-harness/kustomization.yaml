apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Variant-B zero-trust demo harness: the SVID-bearing durable Deployment + the
# ConfigMap-delivered helper scripts (mcp-call). The ConfigMap is generated from
# services/agent-sandbox/agent-harness/bin/* (single source of truth); configmap.yaml
# is a regenerated artifact — see its header for the regen command. Delivering the
# helpers via ConfigMap (not the image) means they can be edited without a rebuild.
#
# Converted from restartPolicy:Never Pod (sleep 10800) to a 1-replica Deployment
# (sleep infinity). The Deployment auto-restarts on container exit so the harness
# is durable: `oc apply -k services/agent-sandbox/e2e-harness` once, then exec in
# any time. The inference Secret (agent-harness-inference) is optional=true so the
# Deployment schedules even when the Secret is absent.
#
# networkpolicy.yaml is the egress allow-list for the harness pod (DNS + HTTPS +
# the homelab LiteLLM proxy on :4000). The agent's LLM creds live in the
# agent-harness-inference Secret — created out-of-band, NOT in git; see
# inference-secret.example.yaml for its shape and the create command.
#
# NOTE: not wired into ArgoCD auto-sync — the ClusterSPIFFEID sandbox-id label is
# demo-specific and the Vault grant is applied manually. Apply on-demand:
#   oc apply -k services/agent-sandbox/e2e-harness
namespace: agent-sandbox

resources:
  - serviceaccount.yaml
  - rbac.yaml
  - configmap.yaml
  - deployment.yaml
  - networkpolicy.yaml
