apiVersion: v1
kind: ServiceAccount
metadata:
  name: approval-console
  namespace: mcp-gateway
  labels:
    app: approval-console
    app.kubernetes.io/name: approval-console
    app.kubernetes.io/part-of: nvidia-ida
# No special RBAC needed — the console is stateless and calls only
# jit-approver (cluster-internal HTTP) and Gitea (external HTTPS).
# automountServiceAccountToken is false: no K8s API calls from this service.
automountServiceAccountToken: false
