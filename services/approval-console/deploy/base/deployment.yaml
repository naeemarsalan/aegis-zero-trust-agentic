apiVersion: apps/v1
kind: Deployment
metadata:
  name: approval-console
  namespace: mcp-gateway
  labels:
    app: approval-console
    app.kubernetes.io/name: approval-console
    app.kubernetes.io/part-of: nvidia-ida
spec:
  replicas: 1
  selector:
    matchLabels:
      app: approval-console
  template:
    metadata:
      labels:
        app: approval-console
    spec:
      serviceAccountName: approval-console
      automountServiceAccountToken: true
      # Gitea (git.arsalan.io) resolves to a public IP outside the cluster; pin it
      # to the private homelab address so egress stays within 172.16.0.0/12 and the
      # NetworkPolicy allows the call. Mirrors jit-approver's hostAliases convention.
      hostAliases:
        - ip: "172.16.1.1"
          hostnames:
            - "git.arsalan.io"
      containers:
        - name: approval-console
          image: oci.arsalan.io/nvidia-ida/approval-console:webshell-fix-20260623
          imagePullPolicy: Always
          ports:
            - containerPort: 8090
              name: http
              protocol: TCP
          env:
            - name: JIT_APPROVER_URL
              value: "http://jit-approver.mcp-gateway.svc.cluster.local:8080"
            - name: GITEA_URL
              value: "https://git.arsalan.io"
            # GITEA_REPO in owner/repo format — matches jit-approver convention
            - name: GITEA_REPO
              value: "anaeem/nvidia-ida"
            # GITEA_TOKEN: set via Secret + envFrom or Vault injector in overlay.
            # Leave empty here; the config.py file-fallback reads /vault/secrets/gitea-token.
            - name: GITEA_TOKEN
              value: ""
            - name: POLL_INTERVAL_SECONDS
              value: "5"
            - name: PYTHONUNBUFFERED
              value: "1"
            # ---------------------------------------------------------------------------
            # Phase C: persistent-agent provisioning + native-sandbox sessions
            # ---------------------------------------------------------------------------
            # sandbox-launcher endpoint (POST /launch creates the OpenShell sandbox).
            - name: SANDBOX_LAUNCHER_URL
              value: "http://sandbox-launcher.mcp-gateway.svc.cluster.local:8080"
            # Vault (per-sandbox consent grant write at agent-create time).
            - name: VAULT_ADDR
              value: "https://vault.apps.anaeem.na-launch.com"
            # VAULT_TOKEN sourced from secret approval-console-vault in the overlay/live.
            # Skills repo (per-agent Gitea bootstrap).
            - name: SKILLS_REPO_FULL_NAME
              value: "anaeem/skills"
            - name: SKILLS_REPO_URL
              value: "https://git.arsalan.io/anaeem/skills.git"
            # ---------------------------------------------------------------------------
            # L1: console-side mint gate (ADR-0007)
            # ---------------------------------------------------------------------------
            # Use POST /requests/{id}/mint instead of Gitea PR merge for approval.
            # Set to 'false' to fall back to Gitea PR merge (rollback lever).
            - name: JIT_APPROVE_VIA_MINT
              value: "true"
            # JIT_MINT_CONSOLE_TOKEN_OVERRIDE: test/dev seam — leave empty in production.
            # In production the console sends its projected SA token from
            # /var/run/secrets/kubernetes.io/serviceaccount/token automatically
            # (read by _mint_headers() in app.py when this env var is absent).
            # - name: JIT_MINT_CONSOLE_TOKEN_OVERRIDE
            #   value: ""
          # Phase C native-sandbox sessions: the console forwards the LLM inference
          # creds (ANTHROPIC_BASE_URL/API_KEY/AUTH_TOKEN + model ids) into the brain
          # exec command. Sourced from the SAME secret the sandbox-launcher uses, so
          # a console-driven session is identical to a launcher-booted brain. The
          # secret VALUES are never logged. optional=true so the console still boots
          # for non-session use if the secret is absent.
          envFrom:
            - secretRef:
                name: agent-harness-inference
                optional: true
          # Vault injector annotation (optional in overlay): if the Vault injector
          # is active, add vault.hashicorp.com/agent-inject annotations to write
          # the token to /vault/secrets/gitea-token. See overlays/anaeem.
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8090
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8090
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

        # oauth2-proxy: Keycloak-OIDC authentication sidecar.
        # All external traffic enters on :4180; oauth2-proxy validates the session
        # with Keycloak (realm agentic) and proxies authenticated requests to the
        # approval-console on 127.0.0.1:8090. The Route targets port 4180 (proxy).
        # Credentials are sourced from Secret approval-console-oauth2 (created
        # out-of-band; see oauth2-secret.example.yaml). No credentials in git.
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
          args:
            - --provider=oidc
            - --oidc-issuer-url=https://keycloak.apps.anaeem.na-launch.com/realms/agentic
            - --client-id=approval-console-oauth2
            - --redirect-url=https://approval-console.apps.anaeem.na-launch.com/oauth2/callback
            - --upstream=http://127.0.0.1:8090
            - --http-address=0.0.0.0:4180
            - --email-domain=*
            - --scope=openid email profile
            - --set-xauthrequest=true
            - --pass-user-headers=true
            - --pass-access-token=false
            - --cookie-secure=true
            - --skip-provider-button=true
          env:
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: approval-console-oauth2
                  key: client-secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: approval-console-oauth2
                  key: cookie-secret
          ports:
            - containerPort: 4180
              name: proxy
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault

      securityContext:
        seccompProfile:
          type: RuntimeDefault
