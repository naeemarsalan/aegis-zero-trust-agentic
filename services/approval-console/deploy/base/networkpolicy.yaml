# Network policies for approval-console — default-deny with explicit allow list.
---
# Deny all ingress + egress by default
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: approval-console-deny-all
  namespace: mcp-gateway
spec:
  podSelector:
    matchLabels:
      app: approval-console
  policyTypes:
    - Ingress
    - Egress
---
# Ingress: allow from OpenShift Router (browser -> Route -> Service)
# Port 4180: oauth2-proxy sidecar — the Route's targetPort. All external
#   browser traffic enters here; oauth2-proxy validates the Keycloak session
#   before proxying to the console on 127.0.0.1:8090.
# Port 8090: approval-console app port — kept open for in-cluster health
#   checks and debugging. External traffic does NOT reach this port via the
#   Route (the Route targets 4180/proxy).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: approval-console-ingress-router
  namespace: mcp-gateway
spec:
  podSelector:
    matchLabels:
      app: approval-console
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              policy-group.network.openshift.io/ingress: ""
      ports:
        - port: 4180
          protocol: TCP
        - port: 8090
          protocol: TCP
---
# Egress: allow DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: approval-console-egress-dns
  namespace: mcp-gateway
spec:
  podSelector:
    matchLabels:
      app: approval-console
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# Egress: allow to jit-approver (same namespace, port 8080)
# The console proxies all jit-approver reads; this is the primary egress path.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: approval-console-egress-jit-approver
  namespace: mcp-gateway
spec:
  podSelector:
    matchLabels:
      app: approval-console
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: jit-approver
      ports:
        - port: 8080
          protocol: TCP
---
# Egress: allow to Gitea (git.arsalan.io — 172.16.x.x/12 via hostAlias)
# Required for POST /api/approve/{id} which merges the PR via Gitea API.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: approval-console-egress-gitea
  namespace: mcp-gateway
spec:
  podSelector:
    matchLabels:
      app: approval-console
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 172.16.0.0/12
      ports:
        - port: 443
          protocol: TCP
---
# Egress: allow to Kubernetes API server so approval-console can exec into the
# harness pod to launch the Claude agent.
# OpenShift internal apiserver VIP: 172.30.0.1:443
# Standard out-of-cluster apiserver port: 0.0.0.0/0:6443
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: approval-console-egress-apiserver
  namespace: mcp-gateway
spec:
  podSelector:
    matchLabels:
      app: approval-console
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 172.30.0.1/32
      ports:
        - port: 443
          protocol: TCP
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 6443
          protocol: TCP
---
# Egress: allow oauth2-proxy sidecar to reach the Keycloak public Route VIP
# for OIDC discovery, token introspection, and JWKS fetch.
# Keycloak Route VIP (OpenShift HAProxy): 172.16.2.52/32 port 443.
# oauth2-proxy resolves keycloak.apps.anaeem.na-launch.com via cluster DNS
# (permitted by approval-console-egress-dns) which returns this VIP.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: approval-console-egress-keycloak
  namespace: mcp-gateway
spec:
  podSelector:
    matchLabels:
      app: approval-console
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 172.16.2.52/32
      ports:
        - port: 443
          protocol: TCP
