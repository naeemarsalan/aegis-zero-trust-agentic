# EXAMPLE ONLY — DO NOT COMMIT REAL VALUES.
#
# This file documents the shape of the Secret that the oauth2-proxy sidecar
# expects. Create the real Secret out-of-band before deploying:
#
#   oc -n mcp-gateway create secret generic approval-console-oauth2 \
#     --from-literal=client-secret=<KEYCLOAK_CLIENT_SECRET> \
#     --from-literal=cookie-secret=<32-BYTE-RANDOM-BASE64>
#
# Generate a suitable cookie-secret with:
#   python3 -c "import secrets, base64; print(base64.b64encode(secrets.token_bytes(32)).decode())"
#
# Keycloak client setup (realm: agentic):
#   - Client ID  : approval-console-oauth2
#   - Client type: confidential (Standard flow enabled)
#   - Valid redirect URIs: https://console.apps.ocp-dev.na-launch.com/oauth2/callback
#     (the live Route host is console.*, NOT approval-console.* — matches deployment.yaml)
#
# This file is intentionally NOT listed in base/kustomization.yaml.
# The Secret must exist in the cluster before the Deployment rolls out;
# a missing Secret will prevent the pod from starting.
---
apiVersion: v1
kind: Secret
metadata:
  name: approval-console-oauth2
  namespace: mcp-gateway
  labels:
    app.kubernetes.io/name: approval-console
    app.kubernetes.io/part-of: nvidia-ida
type: Opaque
stringData:
  client-secret: REPLACE_ME
  cookie-secret: REPLACE_ME_32_BYTES_BASE64
