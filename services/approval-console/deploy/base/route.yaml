# OpenShift Route — exposes the approval-console UI for browser access.
#
# Traffic flow: browser -> Route (edge TLS termination) -> Service:4180 ->
#   oauth2-proxy sidecar -> Keycloak OIDC auth check ->
#   http://127.0.0.1:8090 (approval-console container, pod-local loopback).
#
# The Route targets port "proxy" (4180) on the Service, not the app port 8090.
# Unauthenticated requests are redirected to Keycloak realm "agentic" for login.
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: approval-console
  namespace: mcp-gateway
  labels:
    app: approval-console
    app.kubernetes.io/name: approval-console
    app.kubernetes.io/part-of: nvidia-ida
  annotations:
    haproxy.router.openshift.io/timeout: 1h
    nvidia-ida/security: "keycloak-oidc-protected — oauth2-proxy sidecar enforces auth"
spec:
  host: approval-console.apps.ocp-dev.na-launch.com
  to:
    kind: Service
    name: approval-console
  port:
    targetPort: proxy
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
