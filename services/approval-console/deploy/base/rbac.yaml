# RBAC for approval-console to exec into the agent-sandbox harness pod.
#
# The approval-console ServiceAccount lives in mcp-gateway but needs to exec
# into a pod in agent-sandbox.  A Role + RoleBinding in agent-sandbox grants
# the minimum required verbs.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: approval-console-harness-exec
  namespace: agent-sandbox
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: approval-console-harness-exec
  namespace: agent-sandbox
subjects:
  - kind: ServiceAccount
    name: approval-console
    namespace: mcp-gateway
roleRef:
  kind: Role
  name: approval-console-harness-exec
  apiGroup: rbac.authorization.k8s.io
