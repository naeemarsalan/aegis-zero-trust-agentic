apiVersion: apps/v1
kind: Deployment
metadata:
  name: jit-approver
  namespace: mcp-gateway
  labels:
    app: jit-approver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jit-approver
  template:
    metadata:
      labels:
        app: jit-approver
      annotations:
        # ---------------------------------------------------------------------------
        # Vault Agent Injector — writes secrets to tmpfs at /vault/secrets/
        # ---------------------------------------------------------------------------
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "jit-approver"
        vault.hashicorp.com/agent-inject-secret-gitea-token: "secret/data/jit-approver/gitea-token"
        vault.hashicorp.com/agent-inject-template-gitea-token: |
          {{- with secret "secret/data/jit-approver/gitea-token" -}}
          {{ .Data.data.token }}
          {{- end }}
        vault.hashicorp.com/agent-inject-secret-webhook-secret: "secret/data/jit-approver/webhook-secret"
        vault.hashicorp.com/agent-inject-template-webhook-secret: |
          {{- with secret "secret/data/jit-approver/webhook-secret" -}}
          {{ .Data.data.secret }}
          {{- end }}
        # N1: stable RS256 signing key for the X-JIT-Session-JWT (UC2). The
        # Kyverno dangerous-tool gate verifies tokens against GET /jwks, so the
        # key MUST be stable across restarts (an ephemeral key would invalidate
        # already-issued session JWTs). Injected as a PEM at JIT_SIGNING_KEY_PATH.
        # If this secret/mount is absent the service generates an EPHEMERAL key
        # (PoC only — fine for a single-replica demo, not for production).
        vault.hashicorp.com/agent-inject-secret-jit-signing-key: "secret/data/jit-approver/jit-signing-key"
        vault.hashicorp.com/agent-inject-template-jit-signing-key: |
          {{- with secret "secret/data/jit-approver/jit-signing-key" -}}
          {{ .Data.data.pem }}
          {{- end }}
        # SPIFFE JWT SVID for Vault JWT auth — written by SPIFFE CSI sidecar
        # The approver reads SVID_JWT_PATH=/var/run/secrets/svid.jwt at login time
    spec:
      serviceAccountName: jit-approver
      # Forgejo (git.arsalan.io) resolves to a PUBLIC IP from inside the cluster
      # (split-horizon DNS), which the egress NetworkPolicy intentionally does not
      # allow — agent-platform egress is pinned to the private homelab range
      # 172.16.0.0/12. Pin the Forgejo hostname to its private address so the PR
      # API calls stay on the allowed in-network path (172.16.1.1 serves the
      # git.arsalan.io vhost by SNI).
      hostAliases:
        - ip: "172.16.1.1"
          hostnames:
            - "git.arsalan.io"
      # true: the Vault Agent injector webhook refuses pods without an SA token
      # volume ("failed to find service account volume mount"), and the agent
      # needs it for Kubernetes auth.
      automountServiceAccountToken: true
      volumes:
        # SPIFFE CSI volume — injects SVID at /var/run/secrets/spiffe.io/
        - name: spiffe-csi
          csi:
            driver: csi.spiffe.io
            readOnly: true
        # Shared tmpfs where the svid-writer sidecar keeps a fresh JWT-SVID
        # (audience=vault) that vault.py reads to authenticate the mint path.
        - name: svid-jwt
          emptyDir:
            medium: Memory
        # TLS client certificate for mTLS gRPC calls to the OpenShell gateway.
        # Secret is created out-of-band (ExternalSecret or manual) in mcp-gateway.
        - name: openshell-client-tls
          secret:
            secretName: openshell-client-tls
            defaultMode: 0440
        # tmpfs for Vault-injected secrets (mounted by Vault agent sidecar)
        # vault-secrets volume/mount come from the Vault Agent injector —
        # pre-declaring them makes the mutated pod invalid (duplicate name).
      containers:
        - name: jit-approver
          image: oci.arsalan.io/nvidia-ida/jit-approver:dev
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: GITEA_BASE_URL
              value: "https://git.arsalan.io"
            - name: GITEA_REPO
              value: "anaeem/nvidia-ida"
            - name: GITEA_DEFAULT_BRANCH
              value: "main"
            - name: VAULT_ADDR
              value: "https://vault.apps.ocp-dev.na-launch.com"
            - name: VAULT_JWT_ROLE
              value: "jit-approver"
            - name: VAULT_JWT_AUTH_PATH
              value: "jwt"
            - name: VAULT_SKIP_VERIFY
              value: "true"  # Vault route uses the router wildcard cert (PoC)
            - name: JIT_ALLOWED_NAMESPACES
              value: "agent-sandbox,agentic-mcp"
            # File paths for secrets injected by Vault agent
            - name: GITEA_TOKEN
              value: ""  # overridden by file fallback /vault/secrets/gitea-token
            - name: GITEA_WEBHOOK_SECRET
              value: ""  # overridden by file fallback /vault/secrets/webhook-secret
            # SVID JWT path — kept fresh by the svid-writer sidecar (below),
            # which fetches a JWT-SVID (audience=vault) from the workload API and
            # writes it here. vault.py reads it to log in to Vault auth/jwt for
            # the kubernetes-secrets-engine mint (identity-based, no static token).
            - name: SVID_JWT_PATH
              value: "/svid/svid.jwt"
            - name: OPENSHELL_GATEWAY_ADDR
              value: "openshell.openshell.svc:8080"
            - name: OPENSHELL_CLIENT_TLS_DIR
              value: "/etc/openshell-client-tls"
            # N1: stable RS256 signing key for the session JWT (UC2). If the file
            # is absent an ephemeral key is generated (PoC). See /jwks + signing.py.
            - name: JIT_SIGNING_KEY_PATH
              value: "/vault/secrets/jit-signing-key"
            # L0: persistence backend (default memory = byte-for-byte live path unchanged).
            # Set to 'postgres' to enable the durable CNPG backend (requires .[durable]).
            - name: JIT_STORE_BACKEND
              value: "memory"
            # L0: fail-closed key guard (default false = PoC ephemeral fallback preserved).
            # Set to 'true' in production to crashloop if the Vault-injected PEM is missing.
            - name: JIT_REQUIRE_STABLE_KEY
              value: "false"
            # L0: DATABASE_URL — consumed ONLY when JIT_STORE_BACKEND=postgres.
            # Sourced from CNPG-generated secret jit-approver-db-app (key 'uri').
            # Commented out by default; uncomment + set JIT_STORE_BACKEND=postgres to enable.
            # - name: DATABASE_URL
            #   valueFrom:
            #     secretKeyRef:
            #       name: jit-approver-db-app
            #       key: uri
            # ---------------------------------------------------------------------------
            # L1: console-side mint gate (ADR-0007)
            # ---------------------------------------------------------------------------
            # Enable the POST /requests/{id}/mint endpoint (default on).
            # Set to 'false' to disable /mint (returns 503) for rollback.
            - name: JIT_MINT_GATE_ENABLED
              value: "true"
            # SPIFFE IDs allowed to call /mint (comma-separated).
            # Only the console service SVID should be here; never agent-sandbox SVIDs.
            - name: JIT_MINT_ALLOWED_SPIFFE_IDS
              value: "spiffe://anaeem.na-launch.com/ns/mcp-gateway/sa/approval-console"
            # Require mTLS SPIFFE SVID for /mint auth (set to 'true' once SPIRE is wired).
            # When 'false' (interim), falls back to Kubernetes SA TokenReview via
            # X-Console-SA-Token header so /mint is NEVER open to unauthenticated callers.
            # See ADR-0007 for the live mTLS on-cluster verify tasks.
            - name: JIT_MINT_REQUIRE_MTLS
              value: "false"
            # Allowed console SA prefix for TokenReview interim auth.
            # Callers whose SA username does not start with this prefix are rejected.
            - name: JIT_MINT_CONSOLE_SA_PREFIX
              value: "system:serviceaccount:mcp-gateway:approval-console"
            - name: PYTHONUNBUFFERED
              value: "1"
          volumeMounts:
            - name: spiffe-csi
              mountPath: /var/run/secrets/spiffe.io
              readOnly: true
            - name: svid-jwt
              mountPath: /svid
              readOnly: true
            - name: openshell-client-tls
              mountPath: /etc/openshell-client-tls
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            # no runAsUser: restricted-v2 assigns the UID from the namespace
            # range; a fixed 1001 is rejected by SCC admission
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
        # Sidecar: keeps a fresh JWT-SVID (audience=vault) at /svid/svid.jwt so the
        # jit-approver app can authenticate the Vault mint by identity rather than a
        # static token. Reuses the agent-sandbox svid-vault-fetch image in writer mode.
        - name: svid-writer
          image: oci.arsalan.io/nvidia-ida/svid-vault-fetch:dev
          imagePullPolicy: Always
          env:
            - name: WRITE_SVID_PATH
              value: "/svid/svid.jwt"
            - name: SPIFFE_ENDPOINT_SOCKET
              value: "unix:///var/run/secrets/spiffe.io/spire-agent.sock"
            - name: VAULT_JWT_AUDIENCE
              value: "vault"
          volumeMounts:
            - name: spiffe-csi
              mountPath: /var/run/secrets/spiffe.io
              readOnly: true
            - name: svid-jwt
              mountPath: /svid
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      securityContext:
        seccompProfile:
          type: RuntimeDefault
