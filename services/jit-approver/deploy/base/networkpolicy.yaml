# Default-deny baseline: only allow explicitly whitelisted ingress/egress.
---
# Deny all ingress to jit-approver by default
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: jit-approver-deny-all
  namespace: mcp-gateway
spec:
  podSelector:
    matchLabels:
      app: jit-approver
  policyTypes:
    - Ingress
    - Egress
---
# Allow ingress from ext-proc-delegation (same namespace) for JWKS fetch (/jwks)
# and any future JWT-verification calls. ext-proc verifies the UC2 X-JIT-Session-JWT
# in-process (server.go handleSandboxAgentPath) and needs HTTP access to jit-approver.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: jit-approver-ingress-ext-proc
  namespace: mcp-gateway
spec:
  podSelector:
    matchLabels:
      app: jit-approver
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: ext-proc-delegation
      ports:
        - port: 8080
          protocol: TCP
---
# Allow ingress from agent-sandbox pods (POST /requests)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: jit-approver-ingress-agents
  namespace: mcp-gateway
spec:
  podSelector:
    matchLabels:
      app: jit-approver
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: agent-sandbox
      ports:
        - port: 8080
          protocol: TCP
---
# Allow ingress from OpenShift Router (Gitea webhook /webhooks/gitea)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: jit-approver-ingress-router
  namespace: mcp-gateway
spec:
  podSelector:
    matchLabels:
      app: jit-approver
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              policy-group.network.openshift.io/ingress: ""
      ports:
        - port: 8080
          protocol: TCP
---
# Allow ingress from monitoring (Prometheus scrape /metrics)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: jit-approver-ingress-monitoring
  namespace: mcp-gateway
spec:
  podSelector:
    matchLabels:
      app: jit-approver
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: agentic-observability
      ports:
        - port: 8080
          protocol: TCP
---
# Egress: allow DNS (kube-dns)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: jit-approver-egress-dns
  namespace: mcp-gateway
spec:
  podSelector:
    matchLabels:
      app: jit-approver
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# Egress: allow Gitea (git.arsalan.io — FQDN resolves to 172.16.x.x/12 range)
# If the IP is in 172.16.0.0/12, use the CIDR block. This is documented in README.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: jit-approver-egress-gitea
  namespace: mcp-gateway
spec:
  podSelector:
    matchLabels:
      app: jit-approver
  policyTypes:
    - Egress
  egress:
    - to:
        # git.arsalan.io — resolve via DNS; egress to :443 anywhere in RFC1918
        # Update with specific IP once resolved: kubectl get svc -n gitea or nslookup
        - ipBlock:
            cidr: 172.16.0.0/12
      ports:
        - port: 443
          protocol: TCP
---
# Egress: allow Vault (cluster-internal service)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: jit-approver-egress-vault
  namespace: mcp-gateway
spec:
  podSelector:
    matchLabels:
      app: jit-approver
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vault
      ports:
        - port: 8200
          protocol: TCP
    # Also allow vault FQDN via Route (vault.apps.anaeem.na-launch.com -> router :443)
    - to:
        - namespaceSelector:
            matchLabels:
              policy-group.network.openshift.io/ingress: ""
      ports:
        - port: 443
          protocol: TCP
---
# Egress: allow mTLS gRPC to OpenShell gateway (openshell.openshell.svc:8080)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: jit-approver-egress-openshell
  namespace: mcp-gateway
spec:
  podSelector:
    matchLabels:
      app: jit-approver
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshell
      ports:
        - port: 8080
          protocol: TCP
---
# Allow the approval-console web UI to call the jit-approver read API + approve
# (proxy to GET /requests, GET /requests/{id}/detail|status). Same-namespace.
#
# L1 (ADR-0007): POST /requests/{id}/mint is also reached on this same :8080 port.
# /mint is the console-only privileged endpoint that enforces M5 SoD
# (approver_sub != requester_sub). Authentication is enforced in-handler
# (SPIFFE SVID mTLS / Kubernetes SA TokenReview) — NOT by routing.
#
# IMPORTANT: the agent-sandbox ingress rule (jit-approver-ingress-agents above,
# which allows POST /requests from agent pods) MUST NOT be widened to match
# /mint. Defense-in-depth: even if an agent pod could reach :8080, the
# /mint handler rejects callers that are not the console SA (401/403).
# The in-handler auth is the primary control; this NetworkPolicy is secondary.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: jit-approver-ingress-approval-console
  namespace: mcp-gateway
spec:
  podSelector:
    matchLabels:
      app: jit-approver
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: approval-console
      ports:
        - port: 8080
          protocol: TCP
