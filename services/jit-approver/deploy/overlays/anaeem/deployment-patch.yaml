# Overlay-specific environment tweaks for the anaeem SNO cluster.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jit-approver
  namespace: mcp-gateway
spec:
  template:
    spec:
      containers:
        - name: jit-approver
          env:
            - name: GITEA_BASE_URL
              value: "https://git.arsalan.io"
            - name: GITEA_REPO
              value: "anaeem/nvidia-ida"
            - name: GITEA_DEFAULT_BRANCH
              value: "main"
            - name: VAULT_ADDR
              value: "https://vault.apps.ocp-dev.na-launch.com"
            - name: JIT_ALLOWED_NAMESPACES
              value: "agent-sandbox,agentic-mcp"
            # LANE A threat-model decision: the control is human-gates-and-logs
            # every elevation, NOT two-human 4-eyes. Self/personal approval is
            # permitted (still filed + approved + recorded in the WORM ledger).
            - name: JIT_ALLOW_SELF_APPROVAL
              value: "true"
            - name: SVID_JWT_PATH
              value: "/svid/svid.jwt"
            - name: OPENSHELL_GATEWAY_ADDR
              value: "openshell.openshell.svc:8080"
            - name: OPENSHELL_CLIENT_TLS_DIR
              value: "/etc/openshell-client-tls"
            - name: LOKI_PUSH_URL
              value: "http://172.16.2.252:3100"
            - name: PYTHONUNBUFFERED
              value: "1"
