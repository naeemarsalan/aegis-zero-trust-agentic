# Overlay-specific environment tweaks for the anaeem SNO cluster.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jit-approver
  namespace: mcp-gateway
spec:
  template:
    spec:
      containers:
        - name: jit-approver
          env:
            - name: GITEA_BASE_URL
              value: "https://git.arsalan.io"
            - name: GITEA_REPO
              value: "anaeem/nvidia-ida"
            - name: GITEA_DEFAULT_BRANCH
              value: "main"
            - name: VAULT_ADDR
              value: "https://vault.apps.anaeem.na-launch.com"
            - name: JIT_ALLOWED_NAMESPACES
              value: "agent-sandbox,agentic-mcp"
            - name: SVID_JWT_PATH
              value: "/svid/svid.jwt"
            - name: LOKI_PUSH_URL
              value: "http://172.16.2.252:3100"
            - name: PYTHONUNBUFFERED
              value: "1"
