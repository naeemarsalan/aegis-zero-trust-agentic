apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mcp-gateway

resources:
  - ../../base

images:
  # e2e-jit stamps sandbox_uid into the session JWT (signing.sandbox_uid_from_spiffe) so
  # ext-proc can bind the JIT exception to the calling sandbox (live-proven; in the registry).
  - name: oci.arsalan.io/nvidia-ida/jit-approver
    newTag: e2e-jit

patches:
  - path: deployment-patch.yaml
    target:
      kind: Deployment
      name: jit-approver
