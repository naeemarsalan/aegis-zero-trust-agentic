apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mcp-gateway

resources:
  - ../../base

images:
  # mint-fix-20260623: built from current source — adds the POST /requests/{id}/mint
  # route (the console L1 mint-gate). The prior e2e-jit/:dev images lacked /mint, so the
  # console Approve button returned 404 "Not Found". This image keeps the e2e-jit
  # sandbox_uid JWT stamping AND serves /mint. (live-proven mint -> 200 issued.)
  - name: oci.arsalan.io/nvidia-ida/jit-approver
    newTag: mint-fix-20260623

patches:
  - path: deployment-patch.yaml
    target:
      kind: Deployment
      name: jit-approver
