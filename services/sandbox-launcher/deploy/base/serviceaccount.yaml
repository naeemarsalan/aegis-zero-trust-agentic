apiVersion: v1
kind: ServiceAccount
metadata:
  name: sandbox-launcher
  namespace: mcp-gateway
  labels:
    app.kubernetes.io/name: sandbox-launcher
    app.kubernetes.io/part-of: nvidia-ida
  annotations:
    # SPIFFE CSI driver injects a SPIFFE SVID at /var/run/secrets/spiffe.io/
    spiffe.io/spiffeid: "spiffe://anaeem.na-launch.com/ns/mcp-gateway/sa/sandbox-launcher"
