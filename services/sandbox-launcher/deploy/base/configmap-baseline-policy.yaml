apiVersion: v1
kind: ConfigMap
metadata:
  name: openshell-baseline-policy
  namespace: mcp-gateway
  labels:
    app.kubernetes.io/name: sandbox-launcher
    app.kubernetes.io/part-of: nvidia-ida
    app.kubernetes.io/component: openshell-policy
  annotations:
    # This ConfigMap mirrors platform/openshell/policies/baseline.yaml.
    # Keep both files in sync — the platform/openshell copy is the single source
    # of truth; this copy exists because the launcher runs in mcp-gateway and
    # Kubernetes volumes cannot mount ConfigMaps across namespaces.
data:
  baseline.yaml: |
    # OpenShell baseline sandbox policy — the GLOBAL FLOOR we control centrally.
    #
    # This is the deny-by-default standing policy applied to EVERY OpenShell sandbox
    # at launch. A sandboxed agent may reach ONLY the platform's own surfaces — the
    # MCP gateway, Keycloak, Vault, and the inference endpoint — and nothing else.
    # Everything outside this allowlist is denied (OpenShell: "if no rule matches, deny").
    #
    # When this floor isn't enough, the agent does NOT get more by default — it must
    # request a time-boxed, approved widening through the JIT flow (UC2), which merges
    # an approved delta onto this baseline via `openshell policy set` and reverts to
    # this exact document on expiry.
    version: 1

    filesystem_policy:
      include_workdir: true
      read_only: [/usr, /lib, /lib64, /bin, /sbin, /proc, /dev/urandom, /app, /etc, /var/log, /vault/secrets, /opt/app-root]
      read_write: [/sandbox, /tmp, /dev/null]
    landlock:
      compatibility: best_effort
    process:
      run_as_user: sandbox
      run_as_group: sandbox

    network_policies:
      mcp_gateway:
        name: platform-mcp-gateway
        endpoints:
          - host: mcp-gateway.apps.anaeem.na-launch.com
            port: 443
            protocol: rest
            tls: terminate
            enforcement: enforce
            access: full
        binaries:
          - { path: /sandbox-agent }
          - { path: /usr/bin/curl }
          # native brain reaches platform surfaces via the mcp-call python helper
          # (runs under /usr/bin/python3.11), not /sandbox-agent or curl (round-6).
          - { path: /usr/bin/python3.11 }
          - { path: /usr/local/bin/mcp-call }
      keycloak:
        name: platform-keycloak
        endpoints:
          - host: keycloak.apps.anaeem.na-launch.com
            port: 443
            protocol: rest
            tls: terminate
            enforcement: enforce
            access: full
        binaries:
          - { path: /sandbox-agent }
          - { path: /usr/bin/curl }
          # native brain reaches platform surfaces via the mcp-call python helper
          # (runs under /usr/bin/python3.11), not /sandbox-agent or curl (round-6).
          - { path: /usr/bin/python3.11 }
          - { path: /usr/local/bin/mcp-call }
      vault:
        name: platform-vault
        endpoints:
          - host: vault.apps.anaeem.na-launch.com
            port: 443
            protocol: rest
            tls: terminate
            enforcement: enforce
            access: full
        binaries:
          - { path: /sandbox-agent }
          - { path: /usr/bin/curl }
          # native brain reaches platform surfaces via the mcp-call python helper
          # (runs under /usr/bin/python3.11), not /sandbox-agent or curl (round-6).
          - { path: /usr/bin/python3.11 }
          - { path: /usr/local/bin/mcp-call }
      inference:
        name: platform-inference
        endpoints:
          - host: api.anthropic.com
            port: 443
            protocol: rest
            tls: terminate
            enforcement: enforce
            access: full
          # LiteLLM agent-brain (172.16.2.251:4000) — the ACTUAL inference endpoint the
          # brain's claude CLI dials (ANTHROPIC_BASE_URL=http://172.16.2.251:4000), NOT the
          # public api.anthropic.com. ROOT CAUSE (round-5, 2026-06-22) of the "policy_denied"
          # blocker rounds 1-4 misattributed to an external LiteLLM credit/policy gate: the
          # OpenShell gateway's per-sandbox forward proxy (openshell-sandbox pid-1 on the
          # confined brain netns' default route) enforces THIS deny-by-default egress
          # allowlist; with only api.anthropic.com listed, the brain's POST to
          # 172.16.2.251:4000 matched no rule -> proxy returned 403 {"error":"policy_denied",
          # "detail":"POST 172.16.2.251:4000/v1/messages?beta=true not permitted by policy"}.
          # Proven: a byte-identical curl from the AGENT container (whose netns uses the
          # openshell-sandbox-egress NetworkPolicy that DOES allow 172.16.2.251:4000, not this
          # proxy) returned 200 — which is exactly why a replay never reproduced the denial.
          # plain HTTP on :4000 (in-cluster LiteLLM); tls=passthrough (no termination, the
          # proto `tls` field is a string of "terminate"|"passthrough", NOT a bool).
          - host: 172.16.2.251
            port: 4000
            protocol: rest
            tls: passthrough
            enforcement: enforce
            access: full
        binaries:
          - { path: /sandbox-agent }
          - { path: /usr/bin/python3 }
          - { path: /usr/bin/node }
          # The native brain's LLM caller is the claude CLI — a standalone ELF at
          # /usr/local/bin/claude (NOT a node script), booted by /usr/bin/python3.11
          # (system interpreter, issue #26b). The floor matches the connecting binary,
          # so the claude ELF + node-22 (the /usr/bin/node symlink target) + python3.11
          # must be allowlisted or the brain's POST to 172.16.2.251:4000 -> policy_denied
          # (root cause round-6, 2026-06-22: only python3/node[/usr/bin] were listed).
          - { path: /usr/bin/python3.11 }
          - { path: /usr/bin/node-22 }
          - { path: /usr/local/bin/claude }
