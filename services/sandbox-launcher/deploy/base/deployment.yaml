apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-launcher
  namespace: mcp-gateway
  labels:
    app: sandbox-launcher
    app.kubernetes.io/name: sandbox-launcher
    app.kubernetes.io/part-of: nvidia-ida
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sandbox-launcher
  template:
    metadata:
      labels:
        app: sandbox-launcher
        app.kubernetes.io/name: sandbox-launcher
        app.kubernetes.io/part-of: nvidia-ida
      annotations:
        # ---------------------------------------------------------------------------
        # Vault Agent Injector — writes secrets to tmpfs at /vault/secrets/
        # ---------------------------------------------------------------------------
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "sandbox-launcher"
        # OIDC client secret for the launcher's own client-credentials gateway token.
        # Written to /vault/secrets/launcher-oidc-secret; read via LAUNCHER_OIDC_CLIENT_SECRET_FILE.
        # This is the launcher service's OWN secret — the caller's token is NEVER stored here.
        vault.hashicorp.com/agent-inject-secret-launcher-oidc-secret: "secret/data/sandbox-launcher/launcher-oidc-secret"
        vault.hashicorp.com/agent-inject-template-launcher-oidc-secret: |
          {{- with secret "secret/data/sandbox-launcher/launcher-oidc-secret" -}}
          {{ .Data.data.secret }}
          {{- end }}
    spec:
      serviceAccountName: sandbox-launcher
      # true: the Vault Agent injector webhook refuses pods without an SA token
      # volume ("failed to find service account volume mount"), and the agent
      # needs it for Kubernetes auth.
      automountServiceAccountToken: true
      volumes:
        # TLS client certificate for mTLS gRPC calls to the OpenShell gateway.
        # Secret is created out-of-band (ExternalSecret or manual) in mcp-gateway.
        - name: openshell-client-tls
          secret:
            secretName: openshell-client-tls
            defaultMode: 0440
        # vault-secrets volume/mount come from the Vault Agent injector webhook —
        # pre-declaring them makes the mutated pod invalid (duplicate name).
        # DO NOT add a vault-secrets volume here.
        # Baseline policy ConfigMap — mounted read-only.
        # kubectl create cm openshell-baseline-policy --from-file=baseline.yaml=platform/openshell/policies/baseline.yaml -n mcp-gateway
        - name: openshell-baseline
          configMap:
            name: openshell-baseline-policy
            items:
              - key: baseline.yaml
                path: baseline.yaml
      containers:
        - name: sandbox-launcher
          image: oci.arsalan.io/nvidia-ida/sandbox-launcher:dev
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          # Inference credentials for the BRAIN that the launched sandbox runs.
          # The launcher reads these from its OWN pod env (openshell._brain_env) and
          # copies them into the sandbox template — the proto environment is
          # map<string,string>, so a Secret cannot be referenced by name there.
          # Mirrors the e2e-harness pattern: an out-of-band Secret (NOT in git) carries
          # ANTHROPIC_BASE_URL / ANTHROPIC_API_KEY / ANTHROPIC_AUTH_TOKEN / AGENT_MODEL /
          # ANTHROPIC_DEFAULT_*_MODEL / ANTHROPIC_SMALL_FAST_MODEL. optional:true so the
          # launcher still boots without it (sandboxes then fall back to sleep-infinity).
          #   oc -n mcp-gateway create secret generic agent-harness-inference \
          #     --from-literal=ANTHROPIC_BASE_URL=http://172.16.2.251:4000 \
          #     --from-literal=ANTHROPIC_API_KEY=<LITELLM_VIRTUAL_KEY> \
          #     --from-literal=ANTHROPIC_AUTH_TOKEN=<LITELLM_VIRTUAL_KEY> \
          #     --from-literal=AGENT_MODEL=anthropic/claude-sonnet-4 \
          #     --from-literal=ANTHROPIC_DEFAULT_SONNET_MODEL=anthropic/claude-sonnet-4 \
          #     --from-literal=ANTHROPIC_DEFAULT_OPUS_MODEL=anthropic/claude-sonnet-4 \
          #     --from-literal=ANTHROPIC_SMALL_FAST_MODEL=anthropic/claude-sonnet-4
          envFrom:
            - secretRef:
                name: agent-harness-inference
                optional: true
          env:
            - name: OPENSHELL_GATEWAY_ADDR
              value: "openshell.openshell.svc:8080"
            - name: OPENSHELL_CLIENT_TLS_DIR
              value: "/etc/openshell-client-tls"
            # Launcher's OWN OIDC client-credentials for the OpenShell gateway
            # (LAUNCHER_OIDC_* — distinct from caller identity; no-credential-passing invariant).
            - name: LAUNCHER_OIDC_TOKEN_URL
              value: "https://keycloak.apps.anaeem.na-launch.com/realms/agentic/protocol/openid-connect/token"
            - name: LAUNCHER_OIDC_CLIENT_ID
              value: "sandbox-launcher"
            # Route uses the ingress wildcard cert; skip verify (PoC, matches ext-proc KEYCLOAK_TLS_INSECURE).
            # Token MUST be minted via the route so iss matches the gateway-configured issuer (keycloak.apps...).
            - name: LAUNCHER_OIDC_INSECURE
              value: "true"
            # File path wins over LAUNCHER_OIDC_CLIENT_SECRET (Vault Agent Injector pattern).
            - name: LAUNCHER_OIDC_CLIENT_SECRET_FILE
              value: "/vault/secrets/launcher-oidc-secret"
            - name: LAUNCHER_OIDC_CLIENT_SECRET
              value: ""  # overridden by file above
            # RHDH Backstage JWKS — verifies the forwarded caller JWT (credentials: forward).
            - name: RHDH_JWKS_URL
              value: "https://developer-hub-rhdh.apps.anaeem.na-launch.com/api/auth/.backstage/jwks.json"
            - name: RHDH_TOKEN_ISSUER
              value: "https://developer-hub-rhdh.apps.anaeem.na-launch.com"
            # Sandbox workload configuration.
            # Brain image: the OpenShell supervisor overrides the container command
            # via OPENSHELL_SANDBOX_COMMAND (see SANDBOX_BOOT_AGENT below), so the
            # image ENTRYPOINT is bypassed — but the runner + skills + claude CLI must
            # be PRESENT in the image. The agent-harness image has them; the legacy
            # sandbox-agent (Go device-flow capstone) does not.
            - name: SANDBOX_IMAGE
              value: "oci.arsalan.io/nvidia-ida/agent-harness:self-escalate"
            - name: SANDBOX_RUNTIME_CLASS
              value: ""
            - name: SANDBOX_NAMESPACE
              value: "openshell"
            # ---------------------------------------------------------------------------
            # Brain boot — make the sandbox run the agent-harness runner instead of
            # "sleep infinity". The launcher copies these into the SandboxTemplate
            # environment map (the only command lever the OpenShell proto exposes):
            #   OPENSHELL_SANDBOX_COMMAND = "cd /app && exec python -m agent_harness.agent_runner"
            #   AGENT_GOAL                = body.goal (threaded per-request)
            #   AGENT_ALLOWED_TOOLS       = below
            #   ANTHROPIC_* / AGENT_MODEL = from the agent-harness-inference Secret (envFrom)
            # Set SANDBOX_BOOT_AGENT=false to revert to the legacy sleep-infinity sandbox.
            - name: SANDBOX_BOOT_AGENT
              value: "true"
            # Bash drives the in-sandbox mcp-call helper, which runs the JIT
            # self-escalation (deny -> file request -> human approves in console ->
            # retry) so the agent never handles a credential and no native MCP server
            # registration is needed. Widen via a comma-separated list if required.
            - name: AGENT_ALLOWED_TOOLS
              value: "Bash"
            - name: KEYCLOAK_REALM_URL
              value: "https://keycloak.apps.anaeem.na-launch.com/realms/agentic"
            - name: MCP_GATEWAY_URL
              value: "https://mcp-gateway.apps.anaeem.na-launch.com"
            # Baseline policy ConfigMap mount path
            - name: OPENSHELL_BASELINE_POLICY_PATH
              value: "/etc/openshell-baseline/baseline.yaml"
            # Vault — consent grant writer (Option-D zero-trust flow).
            # The launcher writes a CONSENT GRANT (not a credential) to Vault KV-v2
            # at secret/data/sandbox-grants/<sandbox-uid> after CreateSandbox succeeds.
            # Auth: in-cluster SA token via Vault k8s auth (same as Vault Agent Injector).
            - name: VAULT_ADDR
              value: "https://vault.apps.anaeem.na-launch.com"
            # PoC: router wildcard cert not in default trust store; skip verify.
            # Production: replace with VAULT_CACERT=/etc/vault-ca/ca.crt.
            - name: VAULT_SKIP_VERIFY
              value: "true"
            - name: VAULT_K8S_AUTH_PATH
              value: "kubernetes"
            - name: VAULT_K8S_AUTH_ROLE
              value: "sandbox-launcher"
            # Grant TTL defaults to the request's ttl_minutes*60; this env var is the
            # fallback when ttl_seconds is not passed (currently always passed from the handler).
            - name: VAULT_GRANT_TTL_SECONDS
              value: "3600"
            - name: PYTHONUNBUFFERED
              value: "1"
          volumeMounts:
            - name: openshell-client-tls
              mountPath: /etc/openshell-client-tls
              readOnly: true
            - name: openshell-baseline
              mountPath: /etc/openshell-baseline
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            # no runAsUser: restricted-v2 assigns the UID from the namespace
            # range; a fixed integer is rejected by SCC admission
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

      securityContext:
        seccompProfile:
          type: RuntimeDefault
