apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

images:
  # grant-e2e-jit-sysroot = grant-e2e-jit-tlsverify PLUS the SPIRE-JWKS TLS anchor fix:
  # default case now uses system root CAs (RootCAs: nil) instead of the SPIFFE X.509 bundle,
  # which correctly validates the LE wildcard cert on the reencrypt Route. Pinned by DIGEST for
  # reproducibility + to close the mutable-tag provenance gap.
  # tag for humans: grant-e2e-jit-sysroot
  - name: oci.arsalan.io/nvidia-ida/ext-proc-delegation
    digest: sha256:2a66aa0aa647631a2264f245090b9908a334a30c5f427f1fe03aaf43e95e2aa6

patches:
  # Activate the SPIRE delegated-credential path (grant backend) — see deployment-patch.yaml.
  - path: deployment-patch.yaml
    target:
      kind: Deployment
      name: ext-proc-delegation

namespace: mcp-gateway
