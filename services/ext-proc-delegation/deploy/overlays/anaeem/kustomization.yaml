apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

images:
  # grant-e2e-jit-split = grant-e2e-jit-sysroot PLUS the two-per-user-token split identity
  # (ADR-0012): ext-proc injects the per-user WRITE token (mcp-tokens-write) on a valid JIT
  # elevation, the per-user READ token otherwise; fail-closed if the write token is absent.
  # Also strips x-jit-session-jwt from upstream responses (security review 2026-06-18).
  # Retains the SPIRE-JWKS system-root TLS anchor. Pinned by DIGEST for reproducibility.
  # tag for humans: grant-e2e-jit-split
  - name: oci.arsalan.io/nvidia-ida/ext-proc-delegation
    digest: sha256:e2b7d0ebd7b862c632f84d0109ec3fb107904ab3d330259a8f7771c1e423e22b

patches:
  # Activate the SPIRE delegated-credential path (grant backend) — see deployment-patch.yaml.
  - path: deployment-patch.yaml
    target:
      kind: Deployment
      name: ext-proc-delegation

namespace: mcp-gateway
