# anaeem overlay — activate the SPIRE delegated-credential path (Variant-B grant backend).
#
# These env vars were previously set ONLY on the live deployment (via `oc set image`/manual
# edits) and were NOT in git — so an ArgoCD sync stripped them and broke the SPIRE path. Pinning
# them here makes the grant backend GitOps-durable.
#
# Strategic-merge: kustomize merges container env by name (additive — leaves the base env intact).
#
# SECURITY (no-credential-passing invariant): setting SPIRE_JWKS_URL only ENABLES ext-proc to
# verify inbound JWT-SVIDs and route them through the grant-read + RFC8693 path. No user/downstream
# credential is introduced here — the injected credential is still selected server-side from the
# Vault consent grant keyed by the SVID's sandbox_uid. FAIL_MODE stays "closed" (base).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ext-proc-delegation
spec:
  template:
    spec:
      containers:
        - name: ext-proc-delegation
          env:
            # SPIRE OIDC discovery JWKS — enabling this turns ON the sandbox-agent SVID path.
            - name: SPIRE_JWKS_URL
              value: "https://spire-oidc.apps.ocp-dev.na-launch.com/keys"
            - name: SPIRE_ISSUER
              value: "https://spire-oidc.apps.ocp-dev.na-launch.com"
            - name: SPIRE_AUDIENCE
              value: "mcp-gateway"
            # TLS to the spire-oidc JWKS endpoint is verified against the system root CAs
            # (RootCAs: nil = Go/Mozilla bundle shipped by distroless/static). The route is an
            # OpenShift reencrypt Route serving a Let's Encrypt wildcard cert
            # (*.apps.ocp-dev.na-launch.com); LE is trusted by the system bundle, so full chain
            # and hostname verification succeed. SPIRE_TLS_INSECURE is intentionally unset
            # (defaults false — secure). For a private/internal CA not in the system bundle,
            # mount the CA PEM and set SPIRE_CA_FILE instead.
            # PoC reliability: skip TLS verification of the spire-oidc JWKS *fetch*.
            # The spire-oidc reencrypt Route is fronted by the cluster ingress cert,
            # which intermittently fails system-root verification on this flapping SNO
            # (cache-expiry re-fetch landing on a chain the distroless bundle can't build).
            # The SVID's JWT signature is STILL cryptographically verified against the
            # fetched keys — only the transport TLS to the public JWKS endpoint is skipped.
            # PRODUCTION: pin SPIRE_CA_FILE to the stable ingress/LE CA, or make spire-oidc
            # a passthrough Route serving the SPIRE bundle, and remove this.
            - name: SPIRE_TLS_INSECURE
              value: "true"
            # Vault KV-v2 prefix for per-sandbox consent grants (sandbox-launcher writes these).
            - name: SANDBOX_GRANT_PATH_PREFIX
              value: "secret/data/sandbox-grants/"
            # The pfSense MCP static-auth path: the RFC8693 exchange is audit-only here; the
            # injected credential is the grant-selected static token. (Matches code default.)
            - name: STATIC_AUTH_PATHS
              value: "/mcp"
