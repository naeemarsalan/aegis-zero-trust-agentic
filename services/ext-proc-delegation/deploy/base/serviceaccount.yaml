apiVersion: v1
kind: ServiceAccount
metadata:
  name: ext-proc-delegation
  namespace: mcp-gateway
  annotations:
    # SPIFFE CSI driver mounts the workload API socket via the volume below.
    # No static credentials — identity comes from SPIRE SVID.
    spiffe.io/spiffe-id: "spiffe://anaeem.na-launch.com/ns/mcp-gateway/sa/ext-proc-delegation"
