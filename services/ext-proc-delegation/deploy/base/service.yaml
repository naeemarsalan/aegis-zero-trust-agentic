apiVersion: v1
kind: Service
metadata:
  name: ext-proc-delegation
  namespace: mcp-gateway
  labels:
    app: ext-proc-delegation
spec:
  selector:
    app: ext-proc-delegation
  ports:
    - name: grpc
      port: 9000
      targetPort: 9000
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
