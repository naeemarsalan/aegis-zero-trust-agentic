apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Namespace mcp-gateway is OWNED by platform/agentgateway/base — shipping it
# from two ArgoCD-managed kustomizations causes a permanent ownership fight
# (and pruning one app would delete the shared namespace).
resources:
  - serviceaccount.yaml
  - deployment.yaml
  - service.yaml
  - networkpolicy.yaml

labels:
  - pairs:
      app.kubernetes.io/name: ext-proc-delegation
      app.kubernetes.io/component: credential-delegation
      app.kubernetes.io/part-of: mcp-gateway
    includeSelectors: false
