apiVersion: apps/v1
kind: Deployment
metadata:
  name: ext-proc-delegation
  namespace: mcp-gateway
  labels:
    app: ext-proc-delegation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ext-proc-delegation
  template:
    metadata:
      labels:
        app: ext-proc-delegation
        # MUST be on the pod (not just the Deployment): the NetworkPolicies
        # (gateway<->ext-proc on 9000) and the SPIRE ClusterSPIFFEID podSelector
        # both target app.kubernetes.io/name. The kustomize labels transformer
        # uses includeSelectors:false and does not reach the pod template, so set
        # it here. Without it the dataplane cannot open the ext_proc stream
        # (10s timeout, "no more response messages") and the pod gets no SVID.
        app.kubernetes.io/name: ext-proc-delegation
      annotations:
        # Vault Agent Injector: inject client-secret onto tmpfs, never in etcd.
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "ext-proc-delegation"
        vault.hashicorp.com/agent-inject-secret-client-secret: "secret/data/mcp-gateway/keycloak-client-secret"
        vault.hashicorp.com/agent-inject-template-client-secret: |
          {{- with secret "secret/data/mcp-gateway/keycloak-client-secret" -}}
          {{ .Data.data.secret }}
          {{- end }}
        vault.hashicorp.com/agent-inject-file-client-secret: "client-secret"
        vault.hashicorp.com/secret-volume-path-client-secret: "/vault/secrets"
    spec:
      serviceAccountName: ext-proc-delegation
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      volumes:
        # SPIFFE CSI driver injects the workload API socket.
        - name: spiffe-workload-api
          csi:
            driver: "csi.spiffe.io"
            readOnly: true
        # NOTE: no manual vault-secrets volume here — the Vault Agent injector
        # adds its own volume+mount named vault-secrets, and pre-declaring it
        # makes the mutated pod invalid (duplicate volume name / mountPath).
      containers:
        - name: ext-proc-delegation
          image: oci.arsalan.io/nvidia-ida/ext-proc-delegation:dev
          imagePullPolicy: Always
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: grpc
              containerPort: 9000
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: KEYCLOAK_TOKEN_URL
              # The PUBLIC route, not the in-cluster Service: the token exchange
              # validates the subject token's iss, which is the route URL. The
              # in-cluster endpoint derives a different issuer and rejects it.
              value: "https://keycloak.apps.anaeem.na-launch.com/realms/agentic/protocol/openid-connect/token"
            - name: KEYCLOAK_TLS_INSECURE
              # The route serves the service-ca cert (wrong SAN); skip verify (PoC).
              value: "true"
            - name: EXCHANGE_MODE
              value: "standard"
            - name: EXCHANGE_CLIENT_ID
              # Must be the Keycloak client whose secret is injected below
              # (secret/mcp-gateway/keycloak-client-secret). There is no
              # "ext-proc-delegation" OIDC client; ext-proc exchanges AS the
              # mcp-gateway confidential client (realm-import documents this).
              value: "mcp-gateway"
            - name: EXCHANGE_SECRET_FILE
              value: "/vault/secrets/client-secret"
            - name: DOWNSTREAM_AUDIENCE
              value: "mcp-downstream"
            # Inbound JWT verification — ext-proc independently verifies the
            # caller token (signature/iss/aud/exp) against Keycloak JWKS rather
            # than trusting the gateway (defense in depth).
            - name: KEYCLOAK_JWKS_URL
              value: "http://keycloak-service.keycloak.svc.cluster.local:8080/realms/agentic/protocol/openid-connect/certs"
            - name: KEYCLOAK_ISSUER
              value: "https://keycloak.apps.anaeem.na-launch.com/realms/agentic"
            - name: EXPECTED_AUDIENCE
              value: "mcp-gateway"
            - name: VAULT_ADDR
              value: "https://vault.apps.anaeem.na-launch.com"
            - name: VAULT_SKIP_VERIFY
              # Vault route cert is not in ext-proc's trust store (PoC).
              value: "true"
            - name: VAULT_JWT_ROLE
              value: "ext-proc-delegation"
            - name: VAULT_JWT_AUDIENCE
              value: "vault"
            - name: TOOL_SECRET_PATH_PREFIX
              value: "secret/data/mcp-tools/"
            - name: FAIL_MODE
              value: "closed"
            - name: MAX_BODY_BYTES
              value: "262144"
            - name: GRPC_ADDR
              value: ":9000"
            - name: METRICS_ADDR
              value: ":9090"
            - name: SPIFFE_ENDPOINT_SOCKET
              value: "unix:///spiffe-workload-api/spire-agent.sock"
          volumeMounts:
            - name: spiffe-workload-api
              mountPath: /spiffe-workload-api
              readOnly: true
          livenessProbe:
            grpc:
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            grpc:
              port: 9000
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
