# Session-token audit — option B (interim, zero app-change): scrape the
# mcp-gateway audit pods' stdout JSON into Loki.
#
# STATUS: IMPLEMENTED + APPLIED 2026-06-23. This file is now a pointer/notes doc;
# the live implementation is a dedicated DaemonSet collector, NOT a patch to the
# main otel-collector (the main collector is a single Deployment with no hostPath
# and its loki label-hints differ from what the dashboards query).
#
#   Implementation:  platform/observability/audit-logscrape/   (base + overlays/anaeem)
#   Dashboard CM:    platform/observability/grafana-dashboards/base/session-token-audit-dashboard-cm.yaml
#   Dashboard JSON:  observability/dashboards/session-token-audit.json
#   Wired into:      platform/observability/overlays/anaeem/kustomization.yaml
#
# As-built decisions (differ from the original sketch below — kept for history):
#   * Dedicated DaemonSet (privileged, SELinux spc_t) reads /var/log/pods
#     read-only and ships DIRECT to Loki (${LOKI_PUSH_URL}/loki/api/v1/push),
#     not via the main collector — so it controls the exact Loki labels the
#     dashboards need and does not perturb the existing OTLP->Loki pipeline.
#   * The stanza `container` operator does NOT auto-parse JSON; an explicit
#     `json_parser parse_from:body parse_to:body on_error:drop_quiet` is required
#     (it also drops the non-JSON uvicorn/httpx access-log noise up front).
#   * approval-console / jit-approver nest the audit record under `msg` (a map);
#     an OTTL `merge_maps(body, body["msg"], ...)` flattens it to the body root so
#     all three sources share one flat shape.
#   * The Loki exporter (v0.102) ALWAYS serializes a map body as the line
#     {"body":{...}} — so Grafana `| json` exposes fields with a body_ prefix
#     (body_event, body_grant_result, body_decision, body_jit_session_id, ...).
#     The dashboards are written to that prefix. Low-cardinality keys
#     (namespace, app, decision, grant_result, jit_session_id, session_id) are
#     ALSO promoted to Loki LABELS via loki.resource.labels hints; high-cardinality
#     fields (nonce, tool_args_hash, mcp_args_hash) stay body fields only.
#
# Verification (done 2026-06-23, all green):
#   - real ext-proc read call (search_firewall_rules) -> Loki stream
#     {namespace="mcp-gateway", app="ext-proc-delegation", decision="allow",
#      grant_result="valid", session_id="..."} with `| json | body_decision`.
#   - console jit.list_requests -> {app="approval-console"} ... | json | body_event.
#   - fail-open canary query (decision=allow & grant_result!=valid) returns 0.
#
# ----------------------------------------------------------------------------
# Original option-B sketch (superseded by the DaemonSet above; kept for context):
#
#   filelog/audit:
#     include:
#       - /var/log/pods/mcp-gateway_ext-proc-delegation-*/*/*.log
#       - /var/log/pods/mcp-gateway_jit-approver-*/*/*.log
#       - /var/log/pods/mcp-gateway_approval-console-*/*/*.log
#     include_file_path: true
#     operators:
#       - type: container
#       - type: json_parser
#         parse_from: body
#         parse_to: attributes
#         on_error: send_quiet
#       - type: copy
#         from: attributes.jit_session_id
#         to: resource["session.jit_id"]
#       - type: copy
#         from: attributes.session_id
#         to: resource["session.id"]
#
#   logs pipeline: receivers [otlp, filelog/audit]; exporters [loki]
#   loki labels:  session.jit_id, session.id, grant_result, decision, mcp_tool, caller_username
