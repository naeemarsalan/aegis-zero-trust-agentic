apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# kyverno is NOT installed via OLM: no kyverno package exists in any of the
# default OpenShift catalogs (verified against community-operators on anaeem).
# It is deployed via Helm chart in platform/kyverno/install/ instead.
resources:
  - zero-trust-workload-identity-manager
  - rhbk
  - sandboxed-containers
  - openshift-gitops
