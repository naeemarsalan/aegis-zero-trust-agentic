# JIT Audit dashboard — Loki log panels + Prometheus JIT metrics.
# Datasources required:
#   - DS_PROMETHEUS: UWM Thanos querier (for JIT counters/gauges)
#   - DS_LOKI: Loki at http://172.16.2.252:3100 (for audit-event log panels)
# Import manually at http://172.16.2.252:3000 if sidecar is not available.
# See grafana-dashboards/README.md.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-jit-audit
  namespace: agentic-observability
  labels:
    grafana_dashboard: "1"
data:
  jit-audit.json: |
    {
      "__inputs": [
        {
          "name": "DS_PROMETHEUS",
          "label": "Prometheus (UWM)",
          "type": "datasource",
          "pluginId": "prometheus",
          "pluginName": "Prometheus"
        },
        {
          "name": "DS_LOKI",
          "label": "Loki",
          "type": "datasource",
          "pluginId": "loki",
          "pluginName": "Loki"
        }
      ],
      "__requires": [
        { "type": "grafana", "id": "grafana", "name": "Grafana", "version": "10.0.0" },
        { "type": "datasource", "id": "prometheus", "name": "Prometheus", "version": "1.0.0" },
        { "type": "datasource", "id": "loki", "name": "Loki", "version": "1.0.0" }
      ],
      "title": "JIT Audit",
      "uid": "jit-audit-v1",
      "description": "JIT request/approval/expiry timeline, active grants table, Loki audit-event panels",
      "version": 1,
      "schemaVersion": 38,
      "refresh": "30s",
      "time": { "from": "now-6h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "cluster",
            "type": "constant",
            "current": { "value": "anaeem" },
            "hide": 2
          },
          {
            "name": "namespace",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
            "query": "label_values(agentic_agent_jit_grants_issued_total, namespace)",
            "multi": true,
            "includeAll": true,
            "current": { "text": "All", "value": "$__all" }
          },
          {
            "name": "user",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
            "query": "label_values(agentic_agent_jit_grants_issued_total, user)",
            "multi": true,
            "includeAll": true,
            "current": { "text": "All", "value": "$__all" }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "JIT Requests / Approvals / Expiries Timeline",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "sum(rate(agentic_agent_jit_requests_total{cluster=\"${cluster}\", namespace=~\"${namespace}\", user=~\"${user}\"}[$__rate_interval]))",
              "legendFormat": "Requests/s"
            },
            {
              "expr": "sum(rate(agentic_agent_jit_grants_issued_total{cluster=\"${cluster}\", namespace=~\"${namespace}\", user=~\"${user}\"}[$__rate_interval]))",
              "legendFormat": "Approvals/s"
            },
            {
              "expr": "sum(rate(agentic_agent_jit_grants_expired_total{cluster=\"${cluster}\", namespace=~\"${namespace}\", user=~\"${user}\"}[$__rate_interval]))",
              "legendFormat": "Expiries/s"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "lineWidth": 2 }
            }
          }
        },
        {
          "id": 2,
          "title": "Active Grants (current)",
          "type": "stat",
          "gridPos": { "x": 0, "y": 8, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "sum(agentic_agent_jit_active_grants{cluster=\"${cluster}\"})",
              "legendFormat": "Active"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "green" },
                  { "value": 10, "color": "yellow" },
                  { "value": 50, "color": "red" }
                ]
              }
            }
          }
        },
        {
          "id": 3,
          "title": "Grants Denied (approval not given)",
          "type": "stat",
          "gridPos": { "x": 6, "y": 8, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "sum(increase(agentic_agent_jit_requests_denied_total{cluster=\"${cluster}\"}[$__range]))",
              "legendFormat": "Denied"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "green" },
                  { "value": 1, "color": "red" }
                ]
              }
            }
          }
        },
        {
          "id": 4,
          "title": "Pending (awaiting approval)",
          "type": "stat",
          "gridPos": { "x": 12, "y": 8, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "sum(agentic_agent_jit_pending_requests{cluster=\"${cluster}\"})",
              "legendFormat": "Pending"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "green" },
                  { "value": 1, "color": "yellow" },
                  { "value": 5, "color": "red" }
                ]
              }
            }
          }
        },
        {
          "id": 5,
          "title": "Active Grants Table",
          "type": "table",
          "gridPos": { "x": 0, "y": 12, "w": 24, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "agentic_agent_jit_active_grants{cluster=\"${cluster}\", namespace=~\"${namespace}\", user=~\"${user}\"} > 0",
              "legendFormat": "{{user}} / {{tool}} / {{namespace}}",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "short" }
          },
          "transformations": [
            { "id": "labelsToFields", "options": {} },
            {
              "id": "organize",
              "options": {
                "renameByName": {
                  "user": "User",
                  "tool": "Tool",
                  "namespace": "Namespace",
                  "expires_at": "Expires",
                  "Value": "Active"
                }
              }
            }
          ]
        },
        {
          "id": 6,
          "title": "Audit Events (ext-proc-delegation logs)",
          "type": "logs",
          "gridPos": { "x": 0, "y": 20, "w": 24, "h": 10 },
          "datasource": { "type": "loki", "uid": "${DS_LOKI}" },
          "targets": [
            {
              "expr": "{app=\"ext-proc-delegation\", cluster=\"${cluster}\"} | json | namespace=~\"${namespace}\" | user=~\"${user}\"",
              "legendFormat": ""
            }
          ],
          "options": {
            "dedupStrategy": "none",
            "showLabels": true,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": false
          }
        },
        {
          "id": 7,
          "title": "JIT Approver Audit Events",
          "type": "logs",
          "gridPos": { "x": 0, "y": 30, "w": 24, "h": 10 },
          "datasource": { "type": "loki", "uid": "${DS_LOKI}" },
          "targets": [
            {
              "expr": "{app=\"jit-approver\", cluster=\"${cluster}\"} | json | namespace=~\"${namespace}\" | user=~\"${user}\"",
              "legendFormat": ""
            }
          ],
          "options": {
            "dedupStrategy": "none",
            "showLabels": true,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": false
          }
        },
        {
          "id": 8,
          "title": "AuthZ Denials Log",
          "type": "logs",
          "gridPos": { "x": 0, "y": 40, "w": 24, "h": 8 },
          "datasource": { "type": "loki", "uid": "${DS_LOKI}" },
          "targets": [
            {
              "expr": "{app=\"ext-proc-delegation\", cluster=\"${cluster}\"} | json | decision=\"deny\" | namespace=~\"${namespace}\" | user=~\"${user}\"",
              "legendFormat": ""
            }
          ],
          "options": {
            "dedupStrategy": "none",
            "showLabels": true,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": false
          }
        },
        {
          "id": 9,
          "title": "Grant TTL Distribution",
          "type": "histogram",
          "gridPos": { "x": 0, "y": 48, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "sum by (le) (agentic_agent_jit_grant_ttl_seconds_bucket{cluster=\"${cluster}\"})",
              "legendFormat": "{{le}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "s" }
          }
        },
        {
          "id": 10,
          "title": "Approval Latency (request to grant)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 48, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (le) (rate(agentic_agent_jit_approval_latency_seconds_bucket{cluster=\"${cluster}\"}[$__rate_interval])))",
              "legendFormat": "p95 approval latency"
            },
            {
              "expr": "histogram_quantile(0.50, sum by (le) (rate(agentic_agent_jit_approval_latency_seconds_bucket{cluster=\"${cluster}\"}[$__rate_interval])))",
              "legendFormat": "p50 approval latency"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "s" }
          }
        }
      ]
    }
