# ConfigMap containing the agentic-platform Grafana dashboard JSON.
# Label grafana_dashboard=1 is recognized by the Grafana sidecar (if present).
# If your existing Grafana at http://172.16.2.252:3000 has the dashboard sidecar
# configured (grafana-sc-dashboard), create this ConfigMap in the namespace the
# sidecar watches. Otherwise import the JSON manually — see README.md.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-agentic-platform
  namespace: agentic-observability
  labels:
    grafana_dashboard: "1"
data:
  agentic-platform.json: |
    {
      "__inputs": [
        {
          "name": "DS_PROMETHEUS",
          "label": "Prometheus (UWM)",
          "description": "User Workload Monitoring Prometheus — Thanos querier endpoint",
          "type": "datasource",
          "pluginId": "prometheus",
          "pluginName": "Prometheus"
        }
      ],
      "__requires": [
        { "type": "grafana", "id": "grafana", "name": "Grafana", "version": "10.0.0" },
        { "type": "datasource", "id": "prometheus", "name": "Prometheus", "version": "1.0.0" }
      ],
      "title": "Agentic Platform",
      "uid": "agentic-platform-v1",
      "description": "Token/cost usage, MCP call latency, tool call counts, authz denials, error rates",
      "version": 1,
      "schemaVersion": 38,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "cluster",
            "type": "constant",
            "current": { "value": "anaeem" },
            "hide": 2
          },
          {
            "name": "model",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
            "query": "label_values(agentic_claude_code_token_usage_total, model)",
            "multi": true,
            "includeAll": true,
            "current": { "text": "All", "value": "$__all" }
          },
          {
            "name": "namespace",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
            "query": "label_values(agentic_agent_authz_denials_total, namespace)",
            "multi": true,
            "includeAll": true,
            "current": { "text": "All", "value": "$__all" }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Token Usage by Model (total)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "sum by (model, type) (rate(agentic_claude_code_token_usage_total{cluster=\"${cluster}\", model=~\"${model}\"}[$__rate_interval]))",
              "legendFormat": "{{model}} / {{type}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "lineWidth": 2 }
            }
          }
        },
        {
          "id": 2,
          "title": "Cost per Agent Run (USD)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "sum by (model, session_id) (rate(agentic_claude_code_cost_usage_total{cluster=\"${cluster}\", model=~\"${model}\"}[$__rate_interval]))",
              "legendFormat": "{{model}} / {{session_id}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD",
              "custom": { "lineWidth": 2 }
            }
          }
        },
        {
          "id": 3,
          "title": "MCP Call Latency (ext-proc histogram)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum by (le, tool) (rate(agentic_ext_proc_call_duration_seconds_bucket{cluster=\"${cluster}\"}[$__rate_interval])))",
              "legendFormat": "p99 {{tool}}"
            },
            {
              "expr": "histogram_quantile(0.95, sum by (le, tool) (rate(agentic_ext_proc_call_duration_seconds_bucket{cluster=\"${cluster}\"}[$__rate_interval])))",
              "legendFormat": "p95 {{tool}}"
            },
            {
              "expr": "histogram_quantile(0.50, sum by (le, tool) (rate(agentic_ext_proc_call_duration_seconds_bucket{cluster=\"${cluster}\"}[$__rate_interval])))",
              "legendFormat": "p50 {{tool}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "lineWidth": 2 }
            }
          }
        },
        {
          "id": 4,
          "title": "Tool Call Counts by Tool / User",
          "type": "bargauge",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "topk(20, sum by (tool, user) (increase(agentic_ext_proc_tool_calls_total{cluster=\"${cluster}\", namespace=~\"${namespace}\"}[$__range])))",
              "legendFormat": "{{tool}} / {{user}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "short" }
          },
          "options": {
            "orientation": "horizontal",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          }
        },
        {
          "id": 5,
          "title": "AuthZ Denials Rate",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 16, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "sum by (user, tool, namespace) (rate(agentic_agent_authz_denials_total{cluster=\"${cluster}\", namespace=~\"${namespace}\"}[$__rate_interval]))",
              "legendFormat": "{{user}} / {{tool}} ({{namespace}})"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {
                "lineWidth": 2,
                "thresholdsStyle": { "mode": "line+area" }
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "green" },
                  { "value": 0.001, "color": "red" }
                ]
              }
            }
          }
        },
        {
          "id": 6,
          "title": "Error Rates (ext-proc + MCP)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 16, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "sum by (service, error_type) (rate(agentic_ext_proc_errors_total{cluster=\"${cluster}\"}[$__rate_interval]))",
              "legendFormat": "{{service}} / {{error_type}}"
            },
            {
              "expr": "sum by (server, tool) (rate(agentic_mcp_tool_errors_total{cluster=\"${cluster}\"}[$__rate_interval]))",
              "legendFormat": "mcp/{{server}} / {{tool}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "lineWidth": 2 }
            }
          }
        },
        {
          "id": 7,
          "title": "JIT Grants Issued",
          "type": "stat",
          "gridPos": { "x": 0, "y": 24, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "sum(increase(agentic_agent_jit_grants_issued_total{cluster=\"${cluster}\"}[$__range]))",
              "legendFormat": "Grants"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "short" }
          }
        },
        {
          "id": 8,
          "title": "Active JIT Grants",
          "type": "stat",
          "gridPos": { "x": 6, "y": 24, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "sum(agentic_agent_jit_active_grants{cluster=\"${cluster}\"})",
              "legendFormat": "Active"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "green" },
                  { "value": 5, "color": "yellow" },
                  { "value": 20, "color": "red" }
                ]
              }
            }
          }
        },
        {
          "id": 9,
          "title": "Total AuthZ Denials",
          "type": "stat",
          "gridPos": { "x": 12, "y": 24, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "sum(increase(agentic_agent_authz_denials_total{cluster=\"${cluster}\"}[$__range]))",
              "legendFormat": "Denials"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "green" },
                  { "value": 1, "color": "red" }
                ]
              }
            }
          }
        },
        {
          "id": 10,
          "title": "Token Usage by Session (top 10)",
          "type": "table",
          "gridPos": { "x": 0, "y": 28, "w": 24, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "topk(10, sum by (session_id, model, user) (increase(agentic_claude_code_token_usage_total{cluster=\"${cluster}\", model=~\"${model}\"}[$__range])))",
              "legendFormat": "{{session_id}} / {{model}} / {{user}}",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "short" }
          },
          "transformations": [
            { "id": "labelsToFields", "options": {} },
            { "id": "organize", "options": { "renameByName": { "Value": "Tokens" } } }
          ]
        }
      ]
    }
