# Secret holding the bearer token (or HMAC key) for the EDA Event Stream webhook.
# DO NOT put real credentials here — populate via Vault Agent Injector or
# external-secrets ExternalSecret in the overlay.
#
# To populate manually for development:
#   oc create secret generic eda-webhook-creds \
#     --from-literal=bearer-token=<YOUR_TOKEN> \
#     -n agentic-observability
#
# In production: use an ExternalSecret referencing Vault path
#   secret/agentic-observability/eda-webhook-creds
apiVersion: v1
kind: Secret
metadata:
  name: eda-webhook-creds
  namespace: agentic-observability
  annotations:
    # Marks this as a placeholder — actual value must be injected before applying alerts/
    kubernetes.io/description: "EDA Event Stream bearer token — populate before use"
type: Opaque
stringData:
  # Replace CHANGEME with the actual bearer token from the AAP EDA Event Stream.
  # See alerts/README.md for instructions on obtaining the token.
  bearer-token: "CHANGEME"
