apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  # Update EDA Event Stream URL with the actual UUID.
  # Edit patch-eda-url.yaml before applying.
  - path: patch-eda-url.yaml
    target:
      group: monitoring.coreos.com
      version: v1alpha1
      kind: AlertmanagerConfig
      name: agentic-eda-routing
