apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# WARNING: cluster-monitoring-config lives in openshift-monitoring (cluster scope).
# user-workload-monitoring-config lives in openshift-user-workload-monitoring.
# Both are CLUSTER-WIDE changes — apply deliberately and only once per cluster.
# The namespace override below applies to agentic-observability resources only;
# the two ConfigMaps above carry their own namespace fields and are not overridden.

resources:
  - namespace.yaml
  - cluster-monitoring-config.yaml
  - user-workload-monitoring-config.yaml

labels:
  - pairs:
      app.kubernetes.io/managed-by: kustomize
      app.kubernetes.io/part-of: nvidia-ida
      app.kubernetes.io/component: user-workload-monitoring
