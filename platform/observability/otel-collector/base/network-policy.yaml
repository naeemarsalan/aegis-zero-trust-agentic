# Default-deny + targeted ingress for OTel collector.
# Pods in any namespace can push OTLP (ports 4317/4318).
# UWM Prometheus scrapes :8889.
# All egress is permitted (collector must reach Loki at 172.16.2.252:3100).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: otel-collector-ingress
  namespace: agentic-observability
spec:
  podSelector:
    matchLabels:
      app: otel-collector
  policyTypes:
    - Ingress
  ingress:
    # OTLP ingest — any namespace may push telemetry
    - ports:
        - port: 4317
          protocol: TCP
        - port: 4318
          protocol: TCP
    # UWM Prometheus scrape
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-user-workload-monitoring
      ports:
        - port: 8889
          protocol: TCP
    # Health check (liveness/readiness from kubelet)
    - ports:
        - port: 13133
          protocol: TCP
