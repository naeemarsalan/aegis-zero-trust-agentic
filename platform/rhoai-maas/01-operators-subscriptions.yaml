# Stage 2 prerequisite operators for RHOAI MaaS.
#
# IMPORTANT — why a dedicated namespace (kuadrant-system) and NOT openshift-operators:
# The shared openshift-operators namespace is POISONED by a pre-existing, orphaned, broken
# EDB "cloud-native-postgresql" operator upgrade (CSV v1.29.0=Failed + v1.29.1=Pending, deploy 0/1,
# zero EDB Cluster CRs — failing for ~47 days). OLM resolves a namespace as one SAT problem, so any
# NEW subscription placed in openshift-operators returns ResolutionFailed ("constraints not
# satisfiable ... cloud-native-postgresql"). We therefore isolate Kuadrant + LWS in their own
# namespace with their own OperatorGroups so OLM resolves them independently of that poison.
#   - kuadrant-operator: AllNamespaces install mode ONLY -> OperatorGroup with no spec (global scope).
#   - leader-worker-set : OwnNamespace install mode ONLY  -> OperatorGroup targeting its own namespace.
# (Two OperatorGroups in one namespace is NOT allowed, so LWS gets its own namespace too.)
#
# CUTOVER (2026-06-26): community kuadrant-operator -> Red Hat Connectivity Link (RHCL).
# We bootstrapped on the COMMUNITY kuadrant-operator (community-operators, stable = v0.11.1,
# Kuadrant/Authorino/Limitador 0.x) to get an early SPIFFE-SVID auth path. We have since cut
# over to the SUPPORTED RHCL operator (rhcl-operator, redhat-operators, channel stable =
# v1.4.0), which brings authorino-operator + limitador-operator v1.4.0 as OLM dependencies and
# serves AuthConfig v1beta3 + AuthPolicy kuadrant.io/v1. The migrated AuthPolicy is
# spiffe-auth/06-authpolicy.yaml (apiVersion bumped v1beta2 -> v1). RHCL 1.4.0 does ext-authz
# via the wasm-shim (EnvoyFilter), NOT the Istio meshConfig extensionProvider, so the Istio CR
# needed no rewiring. CRITICAL: the shared Authorino listener TLS must stay DISABLED — the
# wasm-shim calls Authorino over PLAINTEXT gRPC :50051; enabling TLS 500s both gateways.
---
apiVersion: v1
kind: Namespace
metadata:
  name: kuadrant-system
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: kuadrant-system
  namespace: kuadrant-system
spec: {}  # no targetNamespaces / no selector == AllNamespaces (global) scope
---
# RHCL operator (Red Hat Connectivity Link) — the SUPPORTED replacement for the community
# kuadrant-operator. CSV rhcl-operator.v1.4.0 -> authorino-operator.v1.4.0 + limitador-operator.v1.4.0.
# (Historical: this was `name: kuadrant-operator`, `source: community-operators` until 2026-06-26.)
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: rhcl-operator
  namespace: kuadrant-system
spec:
  channel: stable
  name: rhcl-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  installPlanApproval: Automatic
---
apiVersion: v1
kind: Namespace
metadata:
  name: leader-worker-set
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: leader-worker-set
  namespace: leader-worker-set
spec:
  targetNamespaces:
    - leader-worker-set   # OwnNamespace mode
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: leader-worker-set
  namespace: leader-worker-set
spec:
  channel: stable-v1.0
  name: leader-worker-set
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  installPlanApproval: Automatic
