# Mock CPU model stand-in — a tiny stdlib HTTP server that answers the OpenAI-ish
# (/v1/models, completions) and KServe-ish (/v2/...) shapes with canned responses.
# ocp-dev has no GPU, so this proves the SPIFFE AUTH PLANE, not model size; real
# large-LLM serving (KServe InferenceService on GPU) is the follow-up.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-model
  namespace: maas
  labels:
    app: mock-model
    kind: mock-cpu-standin
    role: maas-model
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-model
  template:
    metadata:
      labels:
        app: mock-model
        kind: mock-cpu-standin
        role: maas-model
    spec:
      containers:
        - name: predictor
          image: registry.access.redhat.com/ubi9/python-311:latest
          command: ["python", "-c"]
          args:
            - |
              import json
              from http.server import BaseHTTPRequestHandler, HTTPServer
              MODEL="mock-cpu-standin"
              class H(BaseHTTPRequestHandler):
                def _send(self, code, obj):
                  b=json.dumps(obj).encode(); self.send_response(code)
                  self.send_header("Content-Type","application/json")
                  self.send_header("Content-Length",str(len(b))); self.end_headers(); self.wfile.write(b)
                def do_GET(self):
                  if self.path in ("/","/health","/healthz","/v2/health/ready"):
                    return self._send(200,{"status":"ready","model":MODEL})
                  if self.path=="/v1/models":
                    return self._send(200,{"object":"list","data":[{"id":MODEL,"object":"model"}]})
                  if self.path.startswith("/v2/models/"):
                    return self._send(200,{"name":MODEL,"ready":True,"platform":"mock"})
                  return self._send(404,{"error":"not found","path":self.path})
                def do_POST(self):
                  n=int(self.headers.get("Content-Length",0) or 0)
                  try: body=json.loads(self.rfile.read(n) or b"{}")
                  except Exception: body={}
                  # OpenAI-ish completion + KServe-ish predict, both canned
                  return self._send(200,{
                    "model":MODEL,"served_by":"maas-mock-predictor",
                    "note":"CPU/mock stand-in proving the SPIFFE auth plane; real model is the GPU follow-up",
                    "echo_input":body,
                    "predictions":[{"label":"mock","score":0.99}],
                    "choices":[{"index":0,"message":{"role":"assistant","content":"Hello from the SPIFFE-gated MaaS mock model."}}]
                  })
                def log_message(self,*a): pass
              print("mock-model serving :8080",flush=True)
              HTTPServer(("0.0.0.0",8080),H).serve_forever()
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: mock-model
  namespace: maas
  labels:
    app: mock-model
    role: maas-model
spec:
  selector:
    app: mock-model
  ports:
    - name: http
      port: 80
      targetPort: 8080
