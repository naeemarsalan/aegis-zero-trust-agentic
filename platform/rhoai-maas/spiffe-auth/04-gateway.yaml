# MaaS Gateway — Gateway API object on the `istio` class (the only GW class on
# this cluster whose controller Authorino/Kuadrant can enforce ext-authz against).
# HTTP listener is fine for the PoC; TLS is the hardening follow-up.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: maas-gateway
  namespace: maas
spec:
  gatewayClassName: istio
  listeners:
    - name: http
      hostname: maas.apps.ocp-dev.na-launch.com
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
