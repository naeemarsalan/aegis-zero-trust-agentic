# llm-proxy — the CREDENTIAL-INJECTING reverse proxy that puts an OpenRouter/LLM
# chat backend BEHIND the SPIFFE-auth MaaS gateway. The agent presents ONLY its
# JWT-SVID (Authorino authorizes it at the gateway); the upstream LLM key is
# injected SERVER-SIDE here and NEVER reaches the agent.
#
# Flow (LiteLLM is CUT OUT — the proxy forwards DIRECTLY to OpenRouter):
#   agent (SVID) --> maas-gateway (Authorino: maas-spiffe-auth) --> llm-proxy
#       --> [strip client Authorization/SVID; inject Bearer <vault key>]
#       --> https://openrouter.ai/api/v1/chat/completions (OpenAI-compatible)
#
# Key handling: the upstream key is read from Vault (secret/data/mcp-tools/
# openrouter, key 'token') by a Vault Agent sidecar (annotations below) and
# rendered to tmpfs at /vault/secrets/openrouter. It is NEVER baked into the
# image and NEVER committed. The proxy code lives in a ConfigMap (stdlib-only
# Python on a stock ubi9 python image), so there is no custom image to build.
#
# The proxy STRIPS the inbound Authorization header (the agent's SVID bearer)
# and the SPIFFE id headers before forwarding, then sets its own
# Authorization: Bearer <key>. Standard and premium tiers hit the SAME proxy;
# the premium gate (JIT capability) is enforced upstream in the gateway
# AuthPolicy (06) on the /premium path prefix, so the proxy stays dumb.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: llm-proxy
  namespace: maas
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: llm-proxy-code
  namespace: maas
data:
  proxy.py: |
    #!/usr/bin/env python3
    """Credential-injecting LLM reverse proxy (stdlib only).

    Receives an already-authorized request (Authorino validated the SVID at the
    gateway), STRIPS the client Authorization/SVID headers, injects the upstream
    LLM key read from a Vault-rendered file, and forwards DIRECTLY to OpenRouter's
    OpenAI-compatible endpoint (LiteLLM is cut out). Returns the response verbatim.
    """
    import json
    import os
    import sys
    import urllib.request
    import urllib.error
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer

    # Direct to OpenRouter. UPSTREAM already includes /api, so the inbound path
    # rewritten by the gateway to /v1/chat/completions yields the correct URL
    # https://openrouter.ai/api/v1/chat/completions.
    UPSTREAM = os.environ.get("UPSTREAM_BASE_URL", "https://openrouter.ai/api").rstrip("/")
    KEY_FILE = os.environ.get("UPSTREAM_KEY_FILE", "/vault/secrets/openrouter")
    LISTEN_PORT = int(os.environ.get("LISTEN_PORT", "8080"))
    # Headers carrying the agent's identity that MUST NOT leak upstream.
    STRIP = {
        "authorization", "x-jit-capability", "x-forwarded-client-cert",
        "x-spiffe-id", "cookie", "host", "content-length",
    }

    def _read_key():
        try:
            with open(KEY_FILE, "r") as fh:
                return fh.read().strip()
        except OSError as exc:
            sys.stderr.write("llm-proxy: cannot read key file %s: %s\n" % (KEY_FILE, exc))
            return ""

    class Handler(BaseHTTPRequestHandler):
        protocol_version = "HTTP/1.1"

        def log_message(self, fmt, *args):
            sys.stderr.write("llm-proxy %s\n" % (fmt % args))

        def _proxy(self):
            key = _read_key()
            if not key:
                self._send(503, {"error": {"message": "upstream key unavailable", "type": "proxy_error"}})
                return
            length = int(self.headers.get("Content-Length", 0) or 0)
            body = self.rfile.read(length) if length else b""
            # Map the inbound path to the upstream OpenAI-compatible path. The
            # gateway routes BOTH /openrouter/* and /premium/openrouter/* here and
            # rewrites them to /v1/* (URLRewrite). Anything that still arrives with
            # an /openrouter or /premium prefix is normalized defensively.
            path = self.path
            for pfx in ("/premium/openrouter", "/openrouter"):
                if path.startswith(pfx):
                    path = path[len(pfx):] or "/"
                    break
            if not path.startswith("/v1") and not path.startswith("/health"):
                # default OpenAI chat completions if a bare path slips through
                if path in ("/", "/chat/completions"):
                    path = "/v1/chat/completions"
            url = UPSTREAM + path
            fwd = {k: v for k, v in self.headers.items() if k.lower() not in STRIP}
            fwd["Authorization"] = "Bearer " + key
            fwd.setdefault("Content-Type", "application/json")
            # OpenRouter attribution headers (optional, recommended).
            fwd.setdefault("HTTP-Referer", "https://maas.apps.ocp-dev.na-launch.com")
            fwd.setdefault("X-Title", "nvidia-ida MaaS")
            req = urllib.request.Request(url, data=body, headers=fwd, method=self.command)
            try:
                with urllib.request.urlopen(req, timeout=90) as resp:
                    data = resp.read()
                    self.send_response(resp.status)
                    ctype = resp.headers.get("Content-Type", "application/json")
                    self.send_header("Content-Type", ctype)
                    self.send_header("Content-Length", str(len(data)))
                    self.end_headers()
                    self.wfile.write(data)
            except urllib.error.HTTPError as exc:
                data = exc.read()
                self.send_response(exc.code)
                self.send_header("Content-Type", exc.headers.get("Content-Type", "application/json"))
                self.send_header("Content-Length", str(len(data)))
                self.end_headers()
                self.wfile.write(data)
            except Exception as exc:  # noqa: BLE001
                self._send(502, {"error": {"message": "upstream error: %s" % exc, "type": "proxy_error"}})

        def _send(self, code, obj):
            data = json.dumps(obj).encode()
            self.send_response(code)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(data)))
            self.end_headers()
            self.wfile.write(data)

        def do_POST(self):
            self._proxy()

        def do_GET(self):
            if self.path in ("/healthz", "/health", "/health/liveliness"):
                self._send(200, {"status": "ok"})
                return
            self._proxy()

    if __name__ == "__main__":
        srv = ThreadingHTTPServer(("0.0.0.0", LISTEN_PORT), Handler)
        sys.stderr.write("llm-proxy listening on :%d -> %s\n" % (LISTEN_PORT, UPSTREAM))
        srv.serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-proxy
  namespace: maas
  labels:
    app: llm-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-proxy
  template:
    metadata:
      labels:
        app: llm-proxy
      annotations:
        # Vault Agent injector — renders the upstream LLM key to tmpfs. The key
        # is NEVER in the image or git; only this pod (bound SA llm-proxy) can
        # read secret/data/mcp-tools/openrouter via the llm-proxy Vault role.
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "llm-proxy"
        vault.hashicorp.com/agent-inject-secret-openrouter: "secret/data/mcp-tools/openrouter"
        vault.hashicorp.com/agent-inject-template-openrouter: |
          {{- with secret "secret/data/mcp-tools/openrouter" -}}
          {{ .Data.data.token }}
          {{- end -}}
    spec:
      serviceAccountName: llm-proxy
      containers:
        - name: proxy
          image: registry.access.redhat.com/ubi9/python-39
          command: ["python3", "/app/proxy.py"]
          env:
            - name: UPSTREAM_BASE_URL
              value: "https://openrouter.ai/api"
            - name: UPSTREAM_KEY_FILE
              value: "/vault/secrets/openrouter"
            - name: LISTEN_PORT
              value: "8080"
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: code
              mountPath: /app
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: code
          configMap:
            name: llm-proxy-code
---
apiVersion: v1
kind: Service
metadata:
  name: llm-proxy
  namespace: maas
  labels:
    app: llm-proxy
spec:
  selector:
    app: llm-proxy
  ports:
    - name: http
      port: 80
      targetPort: 8080
