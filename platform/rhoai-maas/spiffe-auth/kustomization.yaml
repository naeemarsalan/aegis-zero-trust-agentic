# SPIFFE-auth MaaS — the JWT-SVID IS the model credential (no tokens).
# Apply order matters: Istio (GatewayClass) -> Kuadrant (Authorino) -> model ->
# Gateway -> HTTPRoute -> AuthPolicy. The maas namespace itself is created by the
# parent platform/rhoai-maas overlay; these manifests carry explicit namespaces.
#
# e2e proof — REAL model (KServe OVMS/ONNX style-onnx), from the agent-sandbox
# e2e-harness pod, in-cluster, presenting ONLY its SPIFFE JWT-SVID:
#   STANDARD  no token              -> 401
#   STANDARD  valid JWT-SVID        -> 200  (real model: /v2/models/style-onnx,
#                                            platform=OpenVINO, FP32 [1,3,224,224])
#   PREMIUM   SVID only             -> 403  (no JIT capability)
#   PREMIUM   SVID + capability JWT -> 200  (approve-to-elevate; real model)
#   PREMIUM   SVID + garbage cap    -> 403
#
# Design: docs/design/maas-spiffe-auth.md
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - 01-istio.yaml
  - 02-kuadrant.yaml
  # 03-mock-model.yaml is the CPU mock stand-in (kept for reference / fallback);
  # the live backend is now the REAL KServe model in 09-real-model.yaml. Leave the
  # mock deployed (harmless) but route both tiers at the real predictor.
  - 03-mock-model.yaml
  - 04-gateway.yaml
  - 05-httproute.yaml
  - 06-authpolicy.yaml
  # Premium tier: /premium route + the gateway AuthPolicy (06) enforces a JIT
  # capability JWT on /premium IN ADDITION to the SVID. 08-premium-authpolicy.yaml
  # is NOT included — Authorino allows one AuthConfig per host, so both tiers live
  # in 06; the route-level premium AuthPolicy collides ("host already taken").
  - 07-premium-route.yaml
  # Real model backend (OVMS ServingRuntime + style-onnx InferenceService). Both
  # the standard (05) and premium (07) routes backend onto style-onnx-predictor.
  - 09-real-model.yaml
  # LLM (chat) backend behind the SAME SPIFFE-auth gateway: a credential-
  # injecting proxy (Vault-sourced upstream key, NEVER in image/git) fronting the
  # OpenRouter chat endpoint DIRECTLY (LiteLLM is cut out), plus its routes:
  #   /openrouter           STANDARD (any SVID)
  #   /premium/openrouter   PREMIUM  (SVID + JIT capability, gated by 06)
  - 10-llm-proxy.yaml
  - 11-llm-route.yaml
  # Mesh egress to openrouter.ai (ServiceEntry + DestinationRule TLS origination).
  - 12-egress-openrouter.yaml
  # Admit ns maas to the Vault ingress allowlist (llm-proxy Vault Agent -> :8200).
  - 13-vault-ingress-from-maas.yaml
  # NATIVE MaaS (RHOAI ModelsAsService) AI-asset endpoint: the style-onnx OVMS
  # model (defined once in 09) is LABELED opendatahub.io/genai-asset=true via the
  # patch in 14 (see patches: below — it is NOT a duplicate resource), exposed
  # through the NATIVE data-science gateway (openshift-ingress/maas-default-gateway)
  # with a ROUTE-level SPIFFE AuthPolicy that OVERRIDES the controller's `defaults`
  # gateway-default-auth (15), plus the harness egress NetworkPolicy to reach the
  # native gateway (16).
  # NOTE: the native path uses the SAME shared (now RHCL) Authorino; its listener TLS
  # MUST stay DISABLED or the Kuadrant wasm-shim ext-authz (plaintext gRPC :50051)
  # 500s on BOTH gateways. maas-controller only needs listener TLS as a one-time
  # reconcile precondition — once maas-api is deployed it persists with TLS off.
  - 15-native-asset-route-spiffe.yaml
  - 16-egress-native-gateway-networkpolicy.yaml

# AI-asset labels on the existing style-onnx InferenceService (from 09-real-model.yaml).
patches:
  - path: 14-genai-asset-model.yaml
    target:
      group: serving.kserve.io
      version: v1beta1
      kind: InferenceService
      name: style-onnx
