apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: agentic-mcp

resources:
  - ../../base

# anaeem-specific patches.
# The base is fully parameterized for anaeem (SNO, nfs-csi, Vault at
# vault.apps.anaeem.na-launch.com, registry oci.arsalan.io).
# Add patches here when a second overlay requires different values.

# Example (uncomment when needed):
# patches:
#   - path: patch-pfsense-replicas.yaml
#     target:
#       kind: Deployment
#       name: pfsense-mcp

labels:
  - pairs:
      app.kubernetes.io/managed-by: kustomize
      app.kubernetes.io/instance: anaeem
      app.kubernetes.io/part-of: nvidia-ida
