apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Namespace is created by this component (namespace.yaml).
# RHOAI 3.4.0-ea.2 with DataScienceCluster "data-skill-factory" ALREADY RUNS
# on anaeem — do NOT create DSC/DSCInitialization/operator resources here.
#
# Apply order:
#   1. platform/vault (Vault must be initialized and unsealed)
#   2. platform/rhoai (this component) — namespace + MCP servers
#   3. platform/networkpolicies — default-deny + gateway allowlist for agentic-mcp
namespace: agentic-mcp

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - pfsense-mcp-deployment.yaml
  - pfsense-mcp-service.yaml
  - echo-mcp-deployment.yaml
  - echo-mcp-service.yaml

labels:
  - pairs:
      app.kubernetes.io/managed-by: kustomize
      app.kubernetes.io/part-of: nvidia-ida
