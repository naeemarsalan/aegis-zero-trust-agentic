---
# ServiceAccount for pfsense-mcp.
# Vault Agent Injector uses this SA's token to authenticate to Vault
# and retrieve the pfsense API key at pod start-up.
# automountServiceAccountToken is false; the Vault injector init-container
# mounts the SA token explicitly on a projected volume.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pfsense-mcp
  namespace: agentic-mcp
  labels:
    app.kubernetes.io/name: pfsense-mcp
    app.kubernetes.io/component: mcp-server
    app.kubernetes.io/part-of: nvidia-ida
automountServiceAccountToken: false

---
# ServiceAccount for echo-mcp.
# No Vault credential injection needed — echo-mcp carries no backend secrets.
# It reads only the delegated Authorization header forwarded by ext_proc.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: echo-mcp
  namespace: agentic-mcp
  labels:
    app.kubernetes.io/name: echo-mcp
    app.kubernetes.io/component: mcp-server
    app.kubernetes.io/part-of: nvidia-ida
automountServiceAccountToken: false
