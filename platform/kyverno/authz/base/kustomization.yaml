apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kyverno

resources:
  - namespace.yaml
  - authorizationpolicy-crd.yaml  # envoy.kyverno.io CRD the authz server watches (vendored from kyverno-envoy-plugin v0.3.0)
  - serviceaccount.yaml
  - rbac.yaml
  - deployment.yaml
  - service.yaml
  - networkpolicy.yaml
  - referencegrant.yaml
  - no-unauthenticated-calls.yaml
  - tool-allowlist-mcp-users.yaml
  - dangerous-tools-admins-only.yaml
  - deny-restricted-group.yaml

labels:
  - pairs:
      app.kubernetes.io/managed-by: kustomize
      app.kubernetes.io/part-of: nvidia-ida
      app.kubernetes.io/component: kyverno-authz
