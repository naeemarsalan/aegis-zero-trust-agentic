# Gateway API ReferenceGrant: the AgentgatewayPolicy in mcp-gateway references
# Service kyverno-authz-server across namespaces (extAuth backendRef). Without
# this grant the controller refuses the ref and the proxy fails closed with
# "backend does not exist" -> every request 403s at the ExtAuth stage.
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-agentgateway-extauthz
  namespace: kyverno
spec:
  from:
    - group: agentgateway.dev
      kind: AgentgatewayPolicy
      namespace: mcp-gateway
  to:
    - group: ""
      kind: Service
      name: kyverno-authz-server
