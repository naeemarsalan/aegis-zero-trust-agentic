# AuthorizationPolicy (envoy.kyverno.io) — kyverno-envoy-plugin ext_authz.
#
# WHY this CRD (not policies.kyverno.io/ValidatingPolicy): Kyverno CORE 1.18 and
# the kyverno-envoy-plugin v0.3.0 both claim policies.kyverno.io/ValidatingPolicy.
# Core's admission webhook then rejects the Envoy-mode policies and can't be
# excluded for cluster-scoped CRs. envoy.kyverno.io/AuthorizationPolicy is the
# plugin's own API group, which core never touches.
#
# SCOPE LIMITATION (agentgateway v1.3.0-alpha.1): the gateway validates the JWT
# in its own strict jwtAuth filter (signature/iss/aud) BEFORE this ext_authz
# hop, then does NOT forward the token or its claims to the gRPC ext_authz
# server — verified empirically: the CheckRequest carries 13 headers, none the
# authorization header or any claims header, and metadata_context.filter_metadata
# is empty. So group- and tool-level authorization CANNOT be evaluated here yet:
#   - claim-based rules need the gateway to forward jwt.claims to ext_authz
#     (the policy's traffic.extAuth.grpc metadata mapping does not surface in
#     this alpha).
#   - tool-level rules additionally need a kyverno-envoy-plugin build with the
#     `mcp` CEL library (v0.3.0 lacks mcp.Parse) — see the disabled policies.
#
# Because the gateway's strict jwtAuth already rejects unauthenticated/expired/
# wrong-audience requests before this hop, every request that reaches ext_authz
# is already authenticated. This policy therefore allows it through (no deny
# rules) and exists as the wiring point to re-enable real authorization once the
# gateway forwards claims and the plugin gains MCP CEL. Restore the richer
# ValidatingPolicy form (git history) at that point.
apiVersion: envoy.kyverno.io/v1alpha1
kind: AuthorizationPolicy
metadata:
  name: no-unauthenticated-calls
  namespace: kyverno
  labels:
    app.kubernetes.io/component: authz-policy
    app.kubernetes.io/part-of: nvidia-ida
  annotations:
    policy.nvidia-ida/description: >
      Passthrough authz placeholder. The gateway's strict jwtAuth authenticates
      every request before this hop; finer group/tool authorization is blocked
      on agentgateway claim-forwarding to ext_authz and an MCP-capable plugin.
spec:
  # No deny rules: allow the (already gateway-authenticated) request through.
  # A deny[] entry whose `match` is constant false documents intent without
  # ever firing, and keeps the CRD shape valid.
  deny:
    - match: "false"
      response: envoy.Denied(401).Response()
