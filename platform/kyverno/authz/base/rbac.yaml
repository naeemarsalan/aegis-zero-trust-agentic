---
# ClusterRole allows the authz server to create SubjectAccessReview objects
# (needed if SAR-based policies are ever added; harmless when not).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kyverno-authz-server
  labels:
    app.kubernetes.io/name: kyverno-authz-server
    app.kubernetes.io/component: authz-server
    app.kubernetes.io/part-of: nvidia-ida
rules:
  - apiGroups: ["authorization.k8s.io"]
    resources: ["subjectaccessreviews"]
    verbs: ["create"]
  # The authz server's in-cluster policy source watches these CRs at startup;
  # without list/watch the informer cache never syncs and the pod crashloops.
  - apiGroups: ["envoy.kyverno.io"]
    resources: ["authorizationpolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["policies.kyverno.io"]
    resources: ["validatingpolicies"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kyverno-authz-server
  labels:
    app.kubernetes.io/name: kyverno-authz-server
    app.kubernetes.io/component: authz-server
    app.kubernetes.io/part-of: nvidia-ida
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kyverno-authz-server
subjects:
  - kind: ServiceAccount
    name: kyverno-authz-server
    namespace: kyverno
