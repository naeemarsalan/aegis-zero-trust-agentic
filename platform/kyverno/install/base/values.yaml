# Kyverno Helm values — single-node (SNO) PoC sizing.
#
# OpenShift SCC: the chart pins runAsUser: 65534 in every securityContext,
# which restricted-v2 rejects (UID must come from the namespace range).
# Null out runAsUser everywhere so the SCC assigns the UID.

admissionController:
  replicas: 1
  initContainer:
    securityContext:
      runAsUser: null
  container:
    securityContext:
      runAsUser: null

backgroundController:
  replicas: 1
  securityContext:
    runAsUser: null

# cleanupController is required: platform/kyverno/cleanup ships a
# ClusterCleanupPolicy (JIT resource reaping).
cleanupController:
  replicas: 1
  securityContext:
    runAsUser: null

reportsController:
  replicas: 1
  securityContext:
    runAsUser: null

# SAFETY NET — cascade prevention.
# When Kyverno's admission controller is unhealthy (crashloop, leader-election
# churn, scaled down), webhooks with failurePolicy=Fail and no ready endpoint
# block ALL matching apiserver writes cluster-wide — which previously cascaded
# into kube-controller-manager crashloops and degraded cluster operators
# (the 2026-06-16 outage). forceFailurePolicyIgnore makes the admission
# controller generate every webhook with failurePolicy=Ignore, so a down/flapping
# Kyverno fails OPEN (admission is skipped) instead of taking the cluster down.
# Policy enforcement still works whenever Kyverno is healthy.
features:
  forceFailurePolicyIgnore:
    enabled: true

crds:
  migration:
    securityContext:
      runAsUser: null

webhooksCleanup:
  securityContext:
    runAsUser: null

test:
  securityContext:
    runAsUser: null
