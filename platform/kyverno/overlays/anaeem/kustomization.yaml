apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Aggregating overlay: renders all kyverno sub-components together.
# Individual sub-components can also be applied independently via their own overlays.
#
# Apply order matters:
#   1. install/ — Kyverno controllers + CRDs via Helm chart (OLM has no kyverno package)
#   2. authz/  — Namespace + Deployment + Service + ValidatingPolicies
#   3. guardrails/  — ClusterPolicies (cluster-scoped, no namespace)
#   4. cleanup/  — ClusterCleanupPolicy (cluster-scoped)
resources:
  - ../../install/overlays/anaeem
  - ../../authz/overlays/anaeem
  - ../../guardrails/overlays/anaeem
  - ../../cleanup/overlays/anaeem
