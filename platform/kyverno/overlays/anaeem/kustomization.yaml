apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Aggregating overlay: renders all kyverno sub-components together.
# Individual sub-components can also be applied independently via their own overlays.
#
# Apply order matters:
#   1. authz/  — Namespace + Deployment + Service + ValidatingPolicies
#   2. guardrails/  — ClusterPolicies (cluster-scoped, no namespace)
#   3. cleanup/  — ClusterCleanupPolicy (cluster-scoped)
resources:
  - ../../authz/overlays/anaeem
  - ../../guardrails/overlays/anaeem
  - ../../cleanup/overlays/anaeem
