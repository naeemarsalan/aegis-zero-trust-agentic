apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-e2e-harness-serviceaccount
  labels:
    app.kubernetes.io/component: kyverno-guardrail
    app.kubernetes.io/part-of: nvidia-ida
  annotations:
    policies.kyverno.io/title: Require dedicated ServiceAccount for e2e-harness pods
    policies.kyverno.io/description: >
      Defense-in-depth control for CRITICAL finding B: the ClusterSPIFFEID
      'agent-sandbox-e2e-harness' binds SVIDs by matching the pod label
      nvidia-ida/e2e-harness=true. Without this policy, any principal that can
      create a pod in namespace agent-sandbox can forge that label on a pod
      running under any ServiceAccount, obtain a valid SVID for an arbitrary
      sandbox-id, and receive its Vault-granted downstream credentials.
      This policy ensures that any Pod carrying label nvidia-ida/e2e-harness=true
      in namespace agent-sandbox MUST declare spec.serviceAccountName: e2e-harness.
      A forged-label pod on a different ServiceAccount is rejected at admission,
      so the SVID path remains pinned to the single dedicated SA whose pod-creation
      is controlled by cluster-admin RBAC.
      validationFailureAction is Audit because Kyverno is currently parked at
      replicas=0 in this cluster. The policy is committed now so it becomes
      enforceable immediately upon re-enabling Kyverno. Flip to Enforce once
      Kyverno is confirmed running and the harness pod passes admission.
    # NOTE: flip validationFailureAction to Enforce before production.
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: require-e2e-harness-sa
      match:
        any:
          - resources:
              kinds: ["Pod"]
              namespaces: ["agent-sandbox"]
              selector:
                matchLabels:
                  nvidia-ida/e2e-harness: "true"
      validate:
        message: >
          Pods in agent-sandbox with label nvidia-ida/e2e-harness=true must set
          spec.serviceAccountName: e2e-harness. Using any other ServiceAccount
          with the e2e-harness label enables SVID impersonation via the
          ClusterSPIFFEID agent-sandbox-e2e-harness binding.
        pattern:
          spec:
            serviceAccountName: e2e-harness
