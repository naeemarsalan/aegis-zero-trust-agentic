# Per-capability narrow ServiceAccounts for Loop B3 (ADR-0014 + Phase B plan).
#
# One SA per operation class.  jit-approver calls the k8s TokenRequest API to mint
# a short-lived audience-bound token for whichever SA maps to the approved tool scope.
# Each SA has NO mounted secret token (automountServiceAccountToken: false) — tokens
# are issued on-demand via TokenRequest only, never standing.
#
# jit-approver's ClusterRole (jit-approver-token-request) permits
# serviceaccounts/token:create scoped to exactly these resourceNames.
#
# Namespace placement:
#   - jit-firewall-write:    agentic-mcp  (pfSense MCP server namespace)
#   - jit-resources-scale:  agent-sandbox (k8s-mcp-edit namespace)
#   - jit-pods-exec:        agent-sandbox (exec target namespace)
#
# TODO (B3.1): verify namespace labels match the NetworkPolicy selectors in
#   services/jit-gate/deploy/jit-gate-k8s.yaml before applying.
# ---------------------------------------------------------------------------
---
# Firewall/network-policy write capability
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jit-firewall-write
  namespace: agentic-mcp
  labels:
    app.kubernetes.io/name: jit-firewall-write
    app.kubernetes.io/component: jit-token-sa
    app.kubernetes.io/part-of: nvidia-ida
  annotations:
    nvidia-ida/capability-class: "single_use"
    nvidia-ida/approved-tools: "create_firewall_rule_advanced,add_firewall_rule"
    nvidia-ida/loop: "B3"
automountServiceAccountToken: false
---
# Kubernetes resource scale/create write capability
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jit-resources-scale
  namespace: agent-sandbox
  labels:
    app.kubernetes.io/name: jit-resources-scale
    app.kubernetes.io/component: jit-token-sa
    app.kubernetes.io/part-of: nvidia-ida
  annotations:
    nvidia-ida/capability-class: "single_use"
    nvidia-ida/approved-tools: "resources_create_or_update,resources_scale"
    nvidia-ida/loop: "B3"
automountServiceAccountToken: false
---
# Pod exec / run interactive capability
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jit-pods-exec
  namespace: agent-sandbox
  labels:
    app.kubernetes.io/name: jit-pods-exec
    app.kubernetes.io/component: jit-token-sa
    app.kubernetes.io/part-of: nvidia-ida
  annotations:
    nvidia-ida/capability-class: "reuse_window"
    nvidia-ida/approved-tools: "pods_exec,pods_run"
    nvidia-ida/loop: "B3"
automountServiceAccountToken: false
