---
# Example Secret shape for the skills-repo read-only token.
# DO NOT commit real token values.  Create this out-of-band:
#
#   kubectl create secret generic skills-repo-read-token \
#     --from-literal=token=<gitea-read-only-token> \
#     -n openshell
#
# The token must have read access to the 'agents/skills' repo only.
# It is mounted into the skills-loader init-container by
# platform/kyverno/guardrails/base/mutate-openshell-sandbox-skills-loader.yaml.

apiVersion: v1
kind: Secret
metadata:
  name: skills-repo-read-token
  namespace: openshell
  labels:
    app.kubernetes.io/part-of: nvidia-ida
    app.kubernetes.io/component: skills-reader
  annotations:
    openshell.ai/phase-gate: "G-C3c"
type: Opaque
stringData:
  # Replace with the actual Gitea read-only token at cluster bootstrap time.
  token: "REPLACE_ME_AT_BOOTSTRAP"
