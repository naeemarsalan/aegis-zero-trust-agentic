apiVersion: kataconfiguration.openshift.io/v1
kind: KataConfig
metadata:
  name: cluster-kataconfig
  annotations:
    # Operator subscription lives in platform/00-operators (openshift-sandboxed-containers-operator).
    # Do NOT create an OperatorGroup or Subscription here.
    platform.nvidia-ida/apply-order: "after platform/00-operators"
spec:
  # enablePeerPods: false — nested virt confirmed on anaeem-sno (vmx in /proc/cpuinfo,
  # /dev/kvm present), so we use the standard Kata runtime backed by QEMU on the host.
  # Peer-pods (Azure/AWS VM-based TEE) are NOT enabled in this PoC.
  enablePeerPods: false

  # checkNodeEligibility requires the NFD operator ("no Nodes with required
  # labels found. Is NFD running?"), which is not installed on anaeem.
  # Nested virt was verified manually (vmx in /proc/cpuinfo, /dev/kvm present)
  # so eligibility checking is disabled. The operator applies a MachineConfig
  # and REBOOTS the SNO node when this lands — see README.
  checkNodeEligibility: false

  # kataConfigPoolSelector selects the MachineConfigPool to apply Kata to.
  # On SNO the only pool is "master" (worker and master share the single node).
  kataConfigPoolSelector:
    matchLabels:
      pools.operator.machineconfiguration.openshift.io/master: ""
