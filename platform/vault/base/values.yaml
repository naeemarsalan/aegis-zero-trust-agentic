## Vault Helm values — base configuration for OpenShift SNO (single-replica raft).
## For production HA, set server.ha.replicas: 3, server.ha.raft.setNodeId: true,
## and ensure a 3-node cluster with anti-affinity rules (see README.md).

global:
  openshift: true
  # TLS is terminated at the OpenShift Route (edge/reencrypt).
  # Internal pod-to-pod and agent injection traffic uses in-cluster Kubernetes
  # service mesh or injector mTLS — not Vault's own TLS listener by default.
  # To enable Vault-native TLS, set server.extraEnvironmentVars with
  # VAULT_CACERT/VAULT_TLSCERT/VAULT_TLSKEY pointing to a cert-manager secret.
  tlsDisable: true

injector:
  enabled: true
  # Fully-qualified registries: the cluster resolves unqualified shortnames
  # against registry.connect.redhat.com first, where these tags do not exist
  # (vault-0 sat in ImagePullBackOff on "hashicorp/vault:1.21.2").
  image:
    repository: docker.io/hashicorp/vault-k8s
  agentImage:
    repository: docker.io/hashicorp/vault
  # The Vault Agent Injector webhook requires access from all namespaces that
  # run agent-injected workloads (mcp-gateway, vault itself).
  # MutatingWebhookConfiguration is cluster-scoped — no namespace selector needed
  # for basic operation, but see NetworkPolicy in overlays/anaeem/ for ingress rules.
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 250m

server:
  image:
    repository: docker.io/hashicorp/vault

  # Single-replica integrated raft storage — correct for SNO.
  # HA (3 replicas) is documented in README.md for production.
  ha:
    enabled: false

  standalone:
    enabled: true
    config: |
      ui = true

      listener "tcp" {
        tls_disable = 1
        address     = "[::]:8200"
        cluster_address = "[::]:8201"
      }

      storage "raft" {
        path = "/vault/data"
        node_id = "vault-0"
      }

      # Audit log — written to the audit storage PVC mounted at /vault/audit.
      # The audit device is also enabled via vault-bootstrap.sh (idempotent).
      # audit "file" { file_path = "/vault/audit/vault_audit.log" }
      # Uncomment above for HCL-level default; bootstrap script is authoritative.

      seal "shamir" {}

      api_addr     = "http://vault.vault.svc.cluster.local:8200"
      cluster_addr = "http://vault.vault.svc.cluster.local:8201"

  dataStorage:
    enabled: true
    size: 10Gi
    # local-path, NOT nfs-csi: raft/boltdb hangs on NFS file locking — the
    # server wedged during `operator init` until storage moved off NFS (same
    # failure class as the SPIRE sqlite and CNPG initdb hangs).
    # Explicit because the cluster has two default StorageClasses.
    storageClass: local-path
    accessMode: ReadWriteOnce

  auditStorage:
    enabled: true
    size: 10Gi
    storageClass: local-path
    accessMode: ReadWriteOnce

  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 1Gi
      cpu: 1000m

  # Service account for Vault server — needed for Kubernetes auth engine.
  serviceAccount:
    create: true
    name: vault

  # OpenShift Route is enabled — host is set in the overlay patch.
  route:
    enabled: true
    host: vault.apps.ocp-dev.na-launch.com
    tls:
      termination: edge
      insecureEdgeTerminationPolicy: Redirect

ui:
  enabled: true
  # The UI is served on the same port as the API (:8200).
  # Access via the OpenShift Route above.
