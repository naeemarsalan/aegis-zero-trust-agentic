# RBAC for the Vault Kubernetes secrets engine (UC2 / jit-approver).
#
# jit-approver mints per-session ephemeral credentials via the Vault Kubernetes
# secrets engine using `generated_role_rules` — i.e. Vault dynamically CREATES a
# short-lived ServiceAccount, a Role carrying exactly the approved verbs/resources,
# and a RoleBinding, then issues a TokenRequest for the SA. The reaper deletes them
# on expiry.
#
# For that, the Vault server ServiceAccount (vault/vault) needs cluster-wide rights
# to manage ServiceAccounts + RBAC objects. Creating a Role with arbitrary rules is
# a privilege-escalation operation in Kubernetes, so the binding also needs the
# `bind` and `escalate` verbs on roles/clusterroles (the API server otherwise
# rejects creation of a Role granting permissions the creator lacks).
#
# Scope note: this is broad by necessity (the engine generates arbitrary scoped
# roles); the actual blast radius is bounded by the Vault POLICY on
# kubernetes/roles/jit-* and the allowed_kubernetes_namespaces on each role.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vault-k8s-secrets-engine
  labels:
    app.kubernetes.io/part-of: nvidia-ida
    app.kubernetes.io/component: vault
rules:
  # Manage the ephemeral ServiceAccounts and mint their tokens.
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "list", "create", "update", "delete"]
  - apiGroups: [""]
    resources: ["serviceaccounts/token"]
    verbs: ["create"]
  # Manage the ephemeral (Cluster)Roles + (Cluster)RoleBindings the engine generates.
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
    verbs: ["get", "list", "create", "update", "delete", "bind", "escalate"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vault-k8s-secrets-engine
  labels:
    app.kubernetes.io/part-of: nvidia-ida
    app.kubernetes.io/component: vault
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vault-k8s-secrets-engine
subjects:
  - kind: ServiceAccount
    name: vault
    namespace: vault
