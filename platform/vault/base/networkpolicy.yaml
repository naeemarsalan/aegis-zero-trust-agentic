## NetworkPolicy for vault namespace.
## Default deny-all ingress; explicit allow rules below.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: vault
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
# Allow the Vault Agent Injector webhook to receive calls from the kube-apiserver.
# The apiserver runs in the host-network space on SNO; podSelector {} on an empty
# namespaceSelector will not match it — we need allow-from-apiserver or a separate
# pass. On OpenShift the apiserver egress is from the node network; a blanket
# allow on port 8080 (injector webhook) is standard practice.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-injector-webhook
  namespace: vault
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: vault-agent-injector
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 8080
          protocol: TCP
      # Allow from any namespace — the kube-apiserver origin IP varies by cluster
      # topology.  Restrict further if the apiserver CIDR is known.
      from: []

---
# Allow the Vault server API port from mcp-gateway namespace (ext-proc-delegation,
# jit-approver) and from within vault namespace (raft clustering, health checks).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-vault-api-from-mcp-gateway
  namespace: vault
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: vault
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: mcp-gateway
      ports:
        - port: 8200
          protocol: TCP
        - port: 8201
          protocol: TCP

---
# Allow Vault API access from within the vault namespace itself
# (health probes, raft peer communication).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-vault-intranamespace
  namespace: vault
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: vault
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - port: 8200
          protocol: TCP
        - port: 8201
          protocol: TCP

---
# Allow Vault Agent Injector (in vault ns) to reach Vault server.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-injector-to-vault-api
  namespace: vault
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: vault
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: vault-agent-injector
      ports:
        - port: 8200
          protocol: TCP

---
# Allow OpenShift Router to reach the Vault UI/API Route (edge TLS termination).
# The router runs in openshift-ingress namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-router-to-vault
  namespace: vault
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: vault
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-ingress
      ports:
        - port: 8200
          protocol: TCP
