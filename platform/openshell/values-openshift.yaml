# OpenShell gateway helm overrides for OpenShift (chart ghcr.io/nvidia/openshell/helm-chart).
# OpenShift assigns uid/fsGroup from the namespace range, so the chart's hardcoded
# 1000 must be relaxed. The chart's own OpenShift docs suggest null; we pin to the
# namespace range which also works and is explicit. Sandboxes land in `openshell`.
podSecurityContext:
  fsGroup: 1000990000      # or null to let OpenShift assign
securityContext:
  runAsUser: 1000990000    # or null
sandbox:
  sandboxNamespace: openshell
  # First cut for SVID delegated identity: runc (empty runtimeClass), because the
  # csi.spiffe.io workload-API socket cannot cross the Kata micro-VM boundary.
  # Hardened follow-up = Kata + a nested in-VM SPIRE agent (see ADR-0008).
  runtimeClassName: ""

# --- Gateway authentication (OIDC + mTLS) -----------------------------------
# The management gRPC API is secured with OIDC bearer auth (on top of mTLS).
# allowUnauthenticatedUsers MUST stay false in any non-dev deployment — with it
# true the gateway accepts unauthenticated management RPCs (CreateSandbox,
# UpdateConfig, …), bypassing OIDC entirely.
#
# OIDC issuer = the Keycloak `agentic` realm on its PUBLIC route. That route is
# EDGE-terminated (see platform/keycloak/base/keycloak-cr.yaml — tlsSecret is
# omitted on purpose), so the OpenShift router presents the ingress wildcard
# cert (*.apps.anaeem.na-launch.com) which the gateway can verify. The gateway
# validates the issuer's TLS against caConfigMapName (openshell-oidc-ca), which
# MUST contain the ingress-operator router-CA — populate it from
# openshift-config-managed/default-ingress-cert (key ca-bundle.crt). The chart
# sets SSL_CERT_FILE=/etc/openshell-tls/oidc-ca/ca.crt from that ConfigMap and
# the Rust gateway honours it (verified: JWKS loads over strict TLS).
#
# Keycloak client `openshell-admin` (confidential, client-credentials) carries
# an audience mapper -> openshell-gateway and the realm role openshell-admin, so
# a minted token has aud:[openshell-gateway] and realm_access.roles:[openshell-admin].
server:
  auth:
    allowUnauthenticatedUsers: false
  oidc:
    issuer: "https://keycloak.apps.anaeem.na-launch.com/realms/agentic"
    audience: openshell-gateway
    caConfigMapName: openshell-oidc-ca
    rolesClaim: realm_access.roles
    adminRole: openshell-admin
    userRole: openshell-user
  # Mount the SPIFFE Workload API (csi.spiffe.io) socket into every sandbox pod so
  # the in-sandbox agent can fetch its own JWT-SVID (Option D delegated identity —
  # no user credential ever enters the sandbox). OpenShell also stamps the pod with
  # label openshell.ai/sandbox-id=<uuid>, which the openshell-sandbox ClusterSPIFFEID
  # encodes into the SVID path so ext-proc binds the Vault grant per-sandbox.
  providerTokenGrants:
    spiffe:
      enabled: true
      # workloadApiSocketPath defaults to /spiffe-workload-api/spire-agent.sock
