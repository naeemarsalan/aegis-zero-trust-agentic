# OpenShell baseline sandbox policy — the GLOBAL FLOOR we control centrally.
#
# This is the deny-by-default standing policy applied to EVERY OpenShell sandbox
# at launch (see hack/launch-sandbox.sh). A sandboxed agent may reach ONLY the
# platform's own surfaces — the MCP gateway, Keycloak (device-flow / token),
# Vault, and the inference endpoint — and nothing else on the network. Everything
# outside this allowlist is denied (OpenShell: "if no rule matches, deny").
#
# When this floor isn't enough, the agent does NOT get more by default — it must
# request a time-boxed, approved widening through the JIT flow (UC2), which merges
# an approved delta onto this baseline via `openshell policy set` and reverts to
# this exact document on expiry. So this file is the single authoritative floor;
# change it here (git → ConfigMap → reconcile) to change every agent's baseline.
#
# Note: `openshell policy set` REPLACES the whole policy, so the static
# filesystem/process sections are required here and are carried verbatim into any
# elevated policy; only network_policies / inference are widened by a grant.
version: 1

# Static (locked at sandbox creation): the agent reads its workdir, /tmp, and the
# inference credential delivered to /vault/secrets by the svid-vault-fetch init
# (via the agent's SVID — never a token on disk). Everything else is read-only.
# /opt is read-only because the native-brain image (UBI9 python-311 SCL) keeps its
# python venv + site-packages under /opt/app-root; without /opt readable python's
# site init fails with PermissionError on /opt/app-root/pyvenv.cfg and the brain
# cannot start. The bare webshell never needed it (its binary is /sandbox-agent).
filesystem_policy:
  include_workdir: true
  read_only: [/usr, /lib, /lib64, /bin, /sbin, /proc, /dev/urandom, /app, /etc, /var/log, /vault/secrets, /opt, /spiffe-workload-api, /var/run/secrets]
  read_write: [/sandbox, /tmp, /dev/null]
landlock:
  compatibility: best_effort
process:
  run_as_user: sandbox
  run_as_group: sandbox

# Dynamic (hot-reloadable, and what a JIT grant widens): deny-by-default allowlist.
# Only the platform's own endpoints. No catch-all.
network_policies:
  # Binary allowlists carry BOTH the legacy webshell paths (/sandbox-agent, curl)
  # AND the native-brain paths: the brain egresses via the SCL python at
  # /opt/app-root/bin/python3 (mcp-call + the claude SDK's httpx) and the bundled
  # system CLI at /usr/local/bin/claude. mcp-call lives at /usr/local/bin/mcp-call
  # but is a python script (exec'd by python), so /opt/app-root/bin/python3 covers it.
  mcp_gateway:
    name: platform-mcp-gateway
    endpoints:
      - host: mcp-gateway.apps.ocp-dev.na-launch.com
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        access: full        # the agent POSTs MCP tool calls (not read-only)
    binaries:
      - { path: /sandbox-agent }
      - { path: /usr/bin/curl }
      - { path: /opt/app-root/bin/python3 }
      - { path: /usr/local/bin/claude }
  keycloak:
    name: platform-keycloak
    endpoints:
      - host: keycloak.apps.ocp-dev.na-launch.com
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        access: full        # device-flow auth + token endpoints
    binaries:
      - { path: /sandbox-agent }
      - { path: /usr/bin/curl }
      - { path: /opt/app-root/bin/python3 }
      - { path: /usr/local/bin/claude }
  vault:
    name: platform-vault
    endpoints:
      - host: vault.apps.ocp-dev.na-launch.com
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        access: full
    binaries:
      - { path: /sandbox-agent }
      - { path: /usr/bin/curl }
      - { path: /opt/app-root/bin/python3 }
  # jit-approver (HTTP, in-cluster): mcp-call POSTs the JIT escalation request here
  # on a write 403. The approval-console (browser) approves; mcp-call polls this svc.
  jit_approver:
    name: platform-jit-approver
    endpoints:
      - host: jit-approver.mcp-gateway.svc.cluster.local
        port: 8080
        protocol: rest
        tls: passthrough
        enforcement: enforce
        access: full
    binaries:
      - { path: /opt/app-root/bin/python3 }
      - { path: /usr/local/bin/claude }
  inference:
    name: platform-inference
    endpoints:
      # api.anthropic.com kept for the public path; the live PoC routes the brain
      # through the in-fabric LiteLLM endpoint (ANTHROPIC_BASE_URL=172.16.2.251:4000),
      # so the inference IP+port must be reachable by the SCL python / claude CLI.
      - host: api.anthropic.com
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        access: full        # model API calls
      - host: 172.16.2.251
        port: 4000
        protocol: rest
        tls: passthrough
        enforcement: enforce
        access: full        # LiteLLM (claude-sonnet-4 brain) — http, in-fabric
    binaries:
      - { path: /sandbox-agent }
      - { path: /usr/bin/python3 }
      - { path: /usr/bin/node }
      - { path: /opt/app-root/bin/python3 }
      - { path: /usr/local/bin/claude }
      # native brain bootstrap interpreter + node symlink target (issue #26b / round-6)
      - { path: /usr/bin/python3.11 }
      - { path: /usr/bin/node-22 }
