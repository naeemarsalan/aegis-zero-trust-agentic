apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: mcp-echo
  namespace: default
  title: Echo MCP Identity Oracle
  description: >
    Single-tool MCP server (UC1 golden test) that echoes back the delegated
    caller identity — the SPIFFE SVID and the validated Keycloak JWT claims.
    Used by agents to verify their own identity before invoking privileged
    tools. No write capability: read-only and safe to expose to all
    mcp-users without JIT.
  tags:
    - mcp-server
    - identity
    - read-only
  labels:
    nvidia-ida/capability-tier: read-only
    nvidia-ida/jit-required: "false"
    nvidia-ida/transport: streamable-http
    nvidia-ida/trust-domain: anaeem.na-launch.com
  annotations:
    backstage.io/source-location: url:https://git.arsalan.io/anaeem/nvidia-ida/raw/branch/main/platform/devhub/catalog/echo.yaml
    # MCP gateway path this capability maps to (see agentgateway httproute-mcp.yaml: /echo -> echo-mcp)
    nvidia-ida/mcp-endpoint: https://mcp-gateway.apps.anaeem.na-launch.com/echo
    nvidia-ida/mcp-gateway-path: /echo
    nvidia-ida/mcp-backend: echo-mcp.agentic-mcp.svc.cluster.local:8000
    # Tool classification: all tools are read-only; none require JIT.
    nvidia-ida/tools-read-only: "echo (returns caller SPIFFE SVID + JWT claims)"
    nvidia-ida/tools-privileged: "none"
  links:
    - url: https://mcp-gateway.apps.anaeem.na-launch.com/echo
      title: Live echo endpoint (/echo)
      icon: web
    - url: https://git.arsalan.io/anaeem/nvidia-ida/src/branch/main/platform/agentgateway/base/backend-echo-mcp.yaml
      title: agentgateway backend config
      icon: github
spec:
  type: mcp-server
  lifecycle: experimental
  owner: group:default/mcp-admins
  system: system:default/agentic-platform
