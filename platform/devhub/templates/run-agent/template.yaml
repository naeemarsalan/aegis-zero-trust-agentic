apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
# ------------------------------------------------------------------ #
# Run-an-Agent template                                               #
# Loads into RHDH via the Location entry in catalog/all.yaml.         #
# Action used: http:backstage:request                                 #
#   Plugin: roadiehq-scaffolder-backend-module-http-request-dynamic  #
#   (ships in the RHDH image; must be enabled — see OPERATOR WIRING) #
# ------------------------------------------------------------------ #
metadata:
  name: run-agent
  title: Run an Agent
  description: |
    Spawn a personal, sandboxed AI agent connected to the zero-trust MCP
    gateway. The agent runs as YOU — your Keycloak identity flows end-to-end,
    every privileged MCP tool call is JIT-gated, and the sandbox auto-expires.
    Pick a goal, a capability scope, and whether this is a quick task or a
    longer-lived project.
  tags:
    - ai
    - agent
    - zero-trust
    - mcp
    - sandbox
spec:
  owner: group:default/mcp-admins
  type: agent-sandbox

  # ================================================================ #
  # PARAMETERS — rendered as a two-page wizard in the RHDH UI       #
  # ================================================================ #
  parameters:
    # ── Page 1: Agent objective ──────────────────────────────────── #
    - title: What should the agent do?
      required:
        - goal
        - scope
        - mode
        - capabilities
      properties:

        goal:
          title: Agent goal
          type: string
          description: >
            One sentence describing what you want the agent to accomplish.
            This seeds the agent's system prompt. Be specific — e.g.
            "Audit the WAN firewall rules and report any any-any allows."
          ui:autofocus: true
          ui:options:
            rows: 3
          maxLength: 500

        scope:
          title: Capability scope
          type: string
          description: >
            The permission tier this agent operates at. Read-only tools
            (get_/search_/list_/diagnose_) never require approval.
            Read-write and admin tools trigger a JIT approval pop-up
            addressed to group:default/mcp-admins before each privileged
            call proceeds.
          default: read-only
          enum:
            - read-only
            - read-write
            - admin
          enumNames:
            - "Read-only — get_/search_/list_/diagnose_ tools, no approval needed"
            - "Read-write — adds create_/update_ tools (JIT approval required)"
            - "Admin — adds delete_/apply_ tools (JIT approval + manager co-sign)"

        mode:
          title: Run mode
          type: string
          description: >
            A task is a short-lived, single-objective run. A project is a
            longer-lived sandbox you can return to; it allows a higher TTL
            and retains its workspace between sessions.
          default: task
          enum:
            - task
            - project
          enumNames:
            - "Task — one objective, short TTL, tear down when done"
            - "Project — persistent workspace, higher TTL, resumable"

        # ── capabilities ─────────────────────────────────────────── #
        # Implemented as a static enum + checkboxes widget.
        #
        # WHY NOT MultiEntityPicker?
        #   MultiEntityPicker (ui:field) has a confirmed regression in
        #   Backstage plugin-scaffolder v1.26.0–1.26.1 (issue #27315,
        #   closed without fix, "priority:contrib-needed"). RHDH 1.3 ships
        #   Backstage 1.32.x which falls in the affected version range.
        #   Until the regression is resolved and RHDH ships the fix, the
        #   safe choice is the static enum below.
        #
        #   When the regression is fixed, replace this block with:
        #
        #     capabilities:
        #       title: MCP capabilities
        #       type: array
        #       description: >
        #         Which downstream MCP servers this agent may reach.
        #         Backed by catalog Resources with spec.type=mcp-server.
        #       ui:field: MultiEntityPicker
        #       ui:options:
        #         catalogFilter:
        #           - kind: Resource
        #             spec.type: mcp-server
        #         defaultKind: Resource
        #         defaultNamespace: default
        #         allowArbitraryValues: false
        #
        #   When using MultiEntityPicker, output is string[] of entity refs
        #   (e.g. "resource:default/mcp-pfsense"). The launcher must resolve
        #   refs to gateway paths via the nvidia-ida/mcp-gateway-path
        #   annotation on the catalog entity.
        #
        # Items are keyed by catalog entity name (metadata.name in
        # catalog/pfsense.yaml, catalog/echo.yaml, etc.). The launcher
        # maps these to gateway paths via its internal registry.
        capabilities:
          title: MCP capabilities
          type: array
          description: >
            Which downstream MCP servers this agent may reach through the
            gateway. The launcher resolves these names to gateway paths
            (nvidia-ida/mcp-gateway-path annotation). Leave the default
            selection unless you know you need specific servers.
          ui:widget: checkboxes
          default:
            - mcp-echo
          items:
            type: string
            enum:
              - mcp-pfsense
              - mcp-echo
              # Aspirational — add catalog entity + gateway route before enabling:
              # - mcp-k8s
              # - mcp-dns
            enumNames:
              - "mcp-pfsense — pfSense firewall (327 tools; privileged tools need JIT)"
              - "mcp-echo — identity oracle (read-only, no JIT required)"
          uniqueItems: true

    # ── Page 2: Lifetime & confirmation ─────────────────────────── #
    - title: Lifetime & confirmation
      required:
        - ttlMinutes
        - _confirm
      properties:

        ttlMinutes:
          title: Sandbox TTL (minutes)
          type: integer
          description: >
            The sandbox auto-terminates after this many minutes.
            Tasks cap at 120; projects may run up to 480.
          default: 60
          minimum: 5
          maximum: 480

        _confirm:
          title: Acknowledgement
          type: boolean
          description: >
            I understand that the sandbox is created in namespace
            `agent-sandboxes` with a SPIFFE identity scoped to my
            Keycloak user, that privileged tool calls require JIT
            approval from mcp-admins, and that the sandbox and its
            workspace are destroyed on expiry.
          default: false
          # Note: Backstage does not enforce boolean=true via JSON Schema
          # `const: true` in the frontend form. This field is a UI prompt
          # only; enforcement is on the launcher side (body._confirm must
          # be true or the launcher rejects the request with 400).

  # ================================================================ #
  # STEPS                                                            #
  # ================================================================ #
  steps:
    # ---------------------------------------------------------------- #
    # Step 1 — POST to the sandbox launcher through the RHDH proxy.   #
    #                                                                  #
    # Action: http:backstage:request                                   #
    # Plugin: roadiehq-scaffolder-backend-module-http-request-dynamic  #
    #   - Ships in the RHDH image at:                                  #
    #       dynamic-plugins/dist/roadiehq-scaffolder-backend-module-   #
    #       http-request-dynamic                                        #
    #   - Must be explicitly enabled (see OPERATOR WIRING section).    #
    #   - Verify it is live: GET /api/scaffolder/v2/actions (backend    #
    #     REST endpoint), grep http:backstage. The UI route            #
    #     /create/actions renders HTML — do not curl it.              #
    #                                                                  #
    # Path: /proxy/mcp-launcher/launch                                #
    #   - Routes through the RHDH proxy entry registered under         #
    #     proxy.endpoints./mcp-launcher (see OPERATOR WIRING).         #
    #   - The proxy's target is the placeholder cluster Service:        #
    #       http://sandbox-launcher.mcp-gateway.svc:8080               #
    #   - http:backstage:request cannot target arbitrary URLs;          #
    #     it MUST go through a named proxy entry.                      #
    #                                                                  #
    # Identity: user.ref (e.g. "user:default/arsalan")                #
    #   - Preferred over user.entity.metadata.name because user.ref    #
    #     is always populated from the session token, whereas           #
    #     user.entity requires a matching User entity in the catalog   #
    #     (keycloakOrg ingestion must have run at least once).         #
    #   - The scaffolder runs server-side. RHDH forwards the caller's   #
    #     Backstage credentials as an X-Backstage-User-Info header;    #
    #     the launcher MUST authenticate using that header.            #
    #     The `userRef` body field is client-supplied (templated from  #
    #     user.ref) and must be treated as advisory, not authoritative.#
    # ---------------------------------------------------------------- #
    - id: launchSandbox
      name: Launch sandbox via launcher API
      action: http:backstage:request
      input:
        method: POST
        path: /proxy/mcp-launcher/launch
        headers:
          content-type: application/json
        body:
          # Stable entity ref from the signed-in session — always present.
          # Format: "user:default/<catalog-username>"
          userRef: ${{ user.ref }}
          goal: ${{ parameters.goal }}
          scope: ${{ parameters.scope }}
          mode: ${{ parameters.mode }}
          # Array of catalog entity names; launcher resolves to gateway paths.
          capabilities: ${{ parameters.capabilities }}
          ttlMinutes: ${{ parameters.ttlMinutes }}
          # Acknowledgement forwarded so the launcher can enforce it server-side.
          confirmed: ${{ parameters._confirm }}

    # ---------------------------------------------------------------- #
    # Step 2 — Emit a visible error log if the launcher returned       #
    # a non-2xx status code.                                           #
    #                                                                  #
    # Uses built-in action debug:log (no plugin required).            #
    # Bracket notation required: step id "launchSandbox" is camelCase  #
    # and safe, but bracket form is used consistently for clarity.     #
    # ---------------------------------------------------------------- #
    - id: checkLaunch
      name: Verify launcher response
      action: debug:log
      if: ${{ steps['launchSandbox'].output.code >= 300 }}
      input:
        message: >
          Launcher returned HTTP ${{ steps['launchSandbox'].output.code }}.
          Response body: ${{ steps['launchSandbox'].output.body }}
          Check that: (1) http:backstage:request plugin is enabled,
          (2) the proxy entry /mcp-launcher is registered in app-config,
          (3) the sandbox-launcher Service is running in mcp-gateway namespace.
        listWorkspace: false

    # ---------------------------------------------------------------- #
    # Step 3 (DEFERRED — uncomment when launcher emits catalogInfoUrl) #
    # Register the running sandbox as a transient catalog entity.      #
    # Action: catalog:register (built-in, no plugin required).         #
    # ---------------------------------------------------------------- #
    # - id: registerSandbox
    #   name: Register sandbox in catalog
    #   action: catalog:register
    #   if: ${{ steps['launchSandbox'].output.code < 300 }}
    #   input:
    #     catalogInfoUrl: ${{ steps['launchSandbox'].output.body.catalogInfoUrl }}
    #     optional: true

  # ================================================================ #
  # OUTPUT — shown on the success page after all steps complete      #
  # ================================================================ #
  output:
    links:
      - title: Open agent conversation
        # conversationUrl is set by the launcher in its JSON response body.
        url: ${{ steps['launchSandbox'].output.body.conversationUrl }}
        icon: chat
      - title: View sandbox in cluster
        # sandboxName is set by the launcher; links to the OpenShift console.
        url: https://console-openshift-console.apps.anaeem.na-launch.com/k8s/ns/agent-sandboxes/agents.x-k8s.io~v1alpha1~Sandbox/${{ steps['launchSandbox'].output.body.sandboxName }}
        icon: kubernetes
    text:
      - title: Sandbox details
        content: |
          **Sandbox name:** `${{ steps['launchSandbox'].output.body.sandboxName }}`
          **Run mode:** `${{ parameters.mode }}`
          **Scope:** `${{ parameters.scope }}`
          **Capabilities:** `${{ parameters.capabilities }}`
          **TTL:** ${{ parameters.ttlMinutes }} minutes
          **Submitted by:** `${{ user.ref }}`
          **Goal:** ${{ parameters.goal }}

          Privileged tool calls still require JIT approval from
          `group:default/mcp-admins` regardless of scope.

# ====================================================================
# OPERATOR WIRING — do NOT apply automatically; merge by hand
# ====================================================================
#
# 1. ENABLE THE PLUGIN
#    Verify http:backstage:request is available on the live cluster:
#      curl -H "Authorization: Bearer <token>" \
#           https://developer-hub-rhdh.apps.anaeem.na-launch.com/api/scaffolder/v2/actions \
#        | python3 -m json.tool | grep 'http:backstage'
#
#    If absent, patch the developer-hub-dynamic-plugins ConfigMap to add:
#      - disabled: false
#        package: ./dynamic-plugins/dist/roadiehq-scaffolder-backend-module-http-request-dynamic
#
# 2. REGISTER THE PROXY ENDPOINT
#    MERGE (do not replace) into the live developer-hub-app-config ConfigMap
#    under data.app-config.yaml:
#
#      proxy:
#        endpoints:
#          /mcp-launcher:
#            target: http://sandbox-launcher.mcp-gateway.svc:8080   # PLACEHOLDER
#            changeOrigin: true
#            credentials: require        # RHDH refuses to proxy when no Backstage
#                                         # credentials are present; it forwards the
#                                         # caller's token upstream but does NOT
#                                         # validate end-user identity itself
#            allowedHeaders:
#              - Content-Type
#            pathRewrite:
#              '^/api/proxy/mcp-launcher/': '/'
#
#    The launcher MUST authenticate the caller using the X-Backstage-User-Info
#    header that RHDH forwards. The `userRef` body field is client-supplied
#    (templated from user.ref by the scaffolder) and must be treated as
#    advisory metadata, not as an authoritative identity claim.
#
# 3. REGISTER THIS TEMPLATE IN THE CATALOG
#    The catalog/all.yaml Location already includes this file (target added).
#    If registering standalone, create a Location entity pointing to:
#      url: https://git.arsalan.io/anaeem/nvidia-ida/raw/branch/main/platform/devhub/templates/run-agent/template.yaml
#
# 4. LAUNCHER CONTRACT
#    The launcher receives a JSON POST body:
#      {
#        "userRef":      "user:default/<username>",   // catalog entity ref
#        "goal":         "<string>",
#        "scope":        "read-only|read-write|admin",
#        "mode":         "task|project",
#        "capabilities": ["mcp-pfsense", "mcp-echo"], // catalog entity names
#        "ttlMinutes":   60,
#        "confirmed":    true
#      }
#    ENFORCEMENT: the launcher MUST reject the request with HTTP 400 when
#    `confirmed` is not exactly boolean true. Backstage cannot enforce this
#    constraint in the frontend form (JSON Schema `const: true` has no effect
#    on form submission); the rejection must happen server-side here.
#
#    It must respond with 200–299 and a JSON body containing at minimum:
#      {
#        "sandboxName":     "<string>",  // used in output links
#        "conversationUrl": "<url>"      // used in output links
#      }
#    Optionally include "catalogInfoUrl" to enable Step 3 (catalog:register).
# ====================================================================
