# Lets the RHDH Kubernetes plugin's ServiceAccount (rhdh:rhdh-k8s, the SA behind
# ${K8S_ANAEEM_TOKEN}) read the openshell namespace so the agent-sandbox entity's
# Workspace tab can render the live pod + the Sandbox CR. Without this the tab 403s.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rhdh-k8s-openshell-reader
rules:
  - apiGroups: [""]
    resources: ["pods","pods/log","services","configmaps","limitranges","resourcequotas","events"]
    verbs: ["get","list","watch"]
  - apiGroups: ["apps"]
    resources: ["deployments","replicasets","statefulsets","daemonsets"]
    verbs: ["get","list","watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get","list","watch"]
  - apiGroups: ["batch"]
    resources: ["jobs","cronjobs"]
    verbs: ["get","list","watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get","list","watch"]
  - apiGroups: ["agents.x-k8s.io"]
    resources: ["sandboxes"]
    verbs: ["get","list","watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rhdh-k8s-openshell-reader
  namespace: openshell
subjects:
  - kind: ServiceAccount
    name: rhdh-k8s
    namespace: rhdh
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: rhdh-k8s-openshell-reader
