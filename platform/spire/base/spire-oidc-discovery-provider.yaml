---
# SpireOIDCDiscoveryProvider singleton — ONE per cluster, named "cluster".
# jwtIssuer must exactly match the public URL used in SpireServer.jwtIssuer
# and the expected 'iss' claim in issued JWTs.
apiVersion: operator.openshift.io/v1alpha1
kind: SpireOIDCDiscoveryProvider
metadata:
  name: cluster
  namespace: zero-trust-workload-identity-manager
spec:
  jwtIssuer: https://spire-oidc.apps.anaeem.na-launch.com
