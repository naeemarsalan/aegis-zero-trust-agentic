---
# SpireAgent singleton — ONE per cluster, named "cluster".
# The agent runs as a DaemonSet on every node and contacts the SpireServer
# to obtain node attestation and workload SVIDs.
apiVersion: operator.openshift.io/v1alpha1
kind: SpireAgent
metadata:
  name: cluster
  namespace: zero-trust-workload-identity-manager
spec:
  # CRD defaults only apply inside objects that are present: with spec {} the
  # operator rendered an agent config with ZERO NodeAttestors and the agent
  # crashed ("expected exactly 1 but got 0"). Set both attestors explicitly.
  nodeAttestor:
    k8sPSATEnabled: "true"
  workloadAttestors:
    k8sEnabled: "true"
