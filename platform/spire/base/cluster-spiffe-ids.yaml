---
# ClusterSPIFFEID for ext-proc-delegation in mcp-gateway namespace.
# Grants all pods running under the ext-proc-delegation ServiceAccount a SVID.
# SVID format: spiffe://anaeem.na-launch.com/ns/mcp-gateway/sa/ext-proc-delegation
apiVersion: spire.spiffe.io/v1alpha1
kind: ClusterSPIFFEID
metadata:
  name: mcp-gateway-ext-proc-delegation
spec:
  spiffeIDTemplate: "spiffe://anaeem.na-launch.com/ns/{{ .PodMeta.Namespace }}/sa/{{ .PodSpec.ServiceAccountName }}"
  podSelector:
    matchLabels:
      app.kubernetes.io/name: ext-proc-delegation
  namespaceSelector:
    matchLabels:
      kubernetes.io/metadata.name: mcp-gateway
  dnsNameTemplates:
    - "ext-proc-delegation.mcp-gateway.svc.cluster.local"
---
# ClusterSPIFFEID for jit-approver in mcp-gateway namespace.
# SVID format: spiffe://anaeem.na-launch.com/ns/mcp-gateway/sa/jit-approver
apiVersion: spire.spiffe.io/v1alpha1
kind: ClusterSPIFFEID
metadata:
  name: mcp-gateway-jit-approver
spec:
  spiffeIDTemplate: "spiffe://anaeem.na-launch.com/ns/{{ .PodMeta.Namespace }}/sa/{{ .PodSpec.ServiceAccountName }}"
  podSelector:
    matchLabels:
      app.kubernetes.io/name: jit-approver
  namespaceSelector:
    matchLabels:
      kubernetes.io/metadata.name: mcp-gateway
  dnsNameTemplates:
    - "jit-approver.mcp-gateway.svc.cluster.local"
---
# ClusterSPIFFEID for agent workloads in agent-sandbox namespace.
# Only pods labelled spiffe.io/spire-managed-identity: "true" receive a SVID.
# This opt-in label prevents untrusted pods from automatically getting an SVID.
# SVID format: spiffe://anaeem.na-launch.com/ns/agent-sandbox/sa/<serviceAccountName>
apiVersion: spire.spiffe.io/v1alpha1
kind: ClusterSPIFFEID
metadata:
  name: agent-sandbox-workloads
spec:
  spiffeIDTemplate: "spiffe://anaeem.na-launch.com/ns/{{ .PodMeta.Namespace }}/sa/{{ .PodSpec.ServiceAccountName }}"
  podSelector:
    matchLabels:
      spiffe.io/spire-managed-identity: "true"
  namespaceSelector:
    matchLabels:
      kubernetes.io/metadata.name: agent-sandbox
---
# ClusterSPIFFEID for OpenShell launcher-created sandbox pods (ns openshell).
# OpenShell stamps each sandbox pod with openshell.ai/managed-by=openshell and
# openshell.ai/sandbox-id=<uuid> when providerTokenGrants.spiffe.enabled=true.
# We encode that sandbox-id into the SVID PATH so each sandbox gets a UNIQUE,
# cryptographically-bound identity. ext-proc parses <uuid> from the sub and reads
# the matching Vault grant at secret/data/sandbox-grants/<uuid> — the per-sandbox
# binding (no spoofable header, no per-sandbox registration needed).
# SVID format: spiffe://anaeem.na-launch.com/ns/openshell/sandbox/<sandbox-uuid>
apiVersion: spire.spiffe.io/v1alpha1
kind: ClusterSPIFFEID
metadata:
  name: openshell-sandbox-workloads
spec:
  spiffeIDTemplate: 'spiffe://anaeem.na-launch.com/ns/{{ .PodMeta.Namespace }}/sandbox/{{ index .PodMeta.Labels "openshell.ai/sandbox-id" }}'
  podSelector:
    matchLabels:
      openshell.ai/managed-by: openshell
  namespaceSelector:
    matchLabels:
      kubernetes.io/metadata.name: openshell
