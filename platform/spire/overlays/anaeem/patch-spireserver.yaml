---
# Strategic merge patch: set OIDC issuer and storageClass for anaeem.
# nfs-csi is explicitly set because the cluster has two default StorageClasses.
apiVersion: operator.openshift.io/v1alpha1
kind: SpireServer
metadata:
  name: cluster
  namespace: zero-trust-workload-identity-manager
spec:
  jwtIssuer: https://spire-oidc.apps.anaeem.na-launch.com
  persistence:
    storageClass: nfs-csi
    size: 1Gi
