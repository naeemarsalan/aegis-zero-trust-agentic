# AgentgatewayBackend: pfsense-mcp
# Proxies StreamableHTTP MCP traffic to pfsense-mcp.agentic-mcp.svc.cluster.local:8000/mcp.
# Verified field shapes from agentgateway/controller/api/v1alpha1/agentgateway/agentgateway_backend_types.go
# (MCPBackend.Targets[].Static: host, port, path, protocol).
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: pfsense-mcp
  namespace: mcp-gateway
  labels:
    app.kubernetes.io/name: pfsense-mcp
    app.kubernetes.io/part-of: agentic-platform
spec:
  mcp:
    targets:
      - name: pfsense-mcp
        static:
          host: pfsense-mcp.agentic-mcp.svc.cluster.local
          port: 8000
          path: /mcp
          protocol: StreamableHTTP
    sessionRouting: Stateful
    failureMode: FailClosed

