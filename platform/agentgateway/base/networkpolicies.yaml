# NetworkPolicies for mcp-gateway namespace
# Component-specific allow rules only. The default-deny-all baseline for this
# namespace is owned by platform/networkpolicies (np-mcp-gateway.yaml) — do
# not duplicate it here or the two ArgoCD apps fight over the same object.
# All policies are additive (OR'd by Kubernetes NetworkPolicy semantics).

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-from-openshift-router
  namespace: mcp-gateway
  labels:
    app.kubernetes.io/part-of: agentic-platform
spec:
  podSelector:
    matchLabels:
      # Label set by agentgateway controller on the data-plane pod
      app.kubernetes.io/name: mcp-gateway
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-ingress
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8443

# -----------------------------------------------------------------------
# 3. Allow egress from gateway pods to agentic-mcp (pfsense-mcp backend)
# -----------------------------------------------------------------------
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-agentic-mcp
  namespace: mcp-gateway
  labels:
    app.kubernetes.io/part-of: agentic-platform
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mcp-gateway
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: agentic-mcp
      ports:
        # OVN evaluates egress after Service DNAT, so the effective dest port is
        # the backend pod's container port (3000 for pfsense-mcp), not the
        # Service port (8000). Allow both — 8000 also covers echo-mcp.
        - protocol: TCP
          port: 3000
        - protocol: TCP
          port: 8000

# -----------------------------------------------------------------------
# 4. Allow egress from gateway pods to Kyverno authz server (ext_authz)
# -----------------------------------------------------------------------
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-kyverno-authz
  namespace: mcp-gateway
  labels:
    app.kubernetes.io/part-of: agentic-platform
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mcp-gateway
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kyverno
      ports:
        - protocol: TCP
          port: 9081

# -----------------------------------------------------------------------
# 5. Allow egress from gateway pods to Keycloak (JWKS fetch)
# -----------------------------------------------------------------------
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-keycloak
  namespace: mcp-gateway
  labels:
    app.kubernetes.io/part-of: agentic-platform
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mcp-gateway
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: keycloak
      ports:
        - protocol: TCP
          port: 8443
        - protocol: TCP
          port: 8080

# -----------------------------------------------------------------------
# 6. ext-proc-delegation: only reachable from gateway pods (same namespace)
#    Deny ingress to ext-proc-delegation from all except gateway pods.
# -----------------------------------------------------------------------
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-extproc-ingress-from-gateway-only
  namespace: mcp-gateway
  labels:
    app.kubernetes.io/part-of: agentic-platform
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: ext-proc-delegation
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mcp-gateway
      ports:
        - protocol: TCP
          port: 9000

# -----------------------------------------------------------------------
# 7. Allow gateway pods to reach ext-proc-delegation (same namespace egress)
# -----------------------------------------------------------------------
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-extproc
  namespace: mcp-gateway
  labels:
    app.kubernetes.io/part-of: agentic-platform
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mcp-gateway
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: ext-proc-delegation
      ports:
        - protocol: TCP
          port: 9000

# -----------------------------------------------------------------------
# 8. Allow controller egress: kube-apiserver (6443), DNS (53)
# -----------------------------------------------------------------------
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-controller-egress-dns-api
  namespace: mcp-gateway
  labels:
    app.kubernetes.io/part-of: agentic-platform
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: controller
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
        - protocol: TCP
          port: 6443

---
# Data plane -> controller xDS (gRPC 9978). The provisioned Gateway proxy
# blocks on "self workload, state manager" until it can stream config.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dataplane-egress-xds
  namespace: mcp-gateway
  labels:
    app.kubernetes.io/part-of: agentic-platform
spec:
  podSelector:
    matchLabels:
      gateway.networking.k8s.io/gateway-name: mcp-gateway
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: agentgateway
      ports:
        - port: 9978
          protocol: TCP

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-controller-ingress-xds
  namespace: mcp-gateway
  labels:
    app.kubernetes.io/part-of: agentic-platform
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: agentgateway
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              gateway.networking.k8s.io/gateway-name: mcp-gateway
      ports:
        - port: 9978
          protocol: TCP
