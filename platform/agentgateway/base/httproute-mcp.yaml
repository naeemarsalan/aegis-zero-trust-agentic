# HTTPRoute: /mcp -> pfsense-mcp, /echo -> echo-mcp AgentgatewayBackends
# The AgentgatewayPolicy (policy.yaml) attaches to this HTTPRoute, so extAuth +
# extProc + authorization (credential delegation) apply to BOTH path rules:
#   /mcp  -> pfsense-mcp  (real 327-tool server; static MCP_API_KEY)
#   /echo -> echo-mcp     (UC1 golden test; echoes the delegated user identity)
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mcp-route
  namespace: mcp-gateway
  labels:
    app.kubernetes.io/name: mcp-route
    app.kubernetes.io/part-of: agentic-platform
spec:
  # group/kind/weight are spelled out even though they are API defaults:
  # the server defaults them on admission and ArgoCD otherwise shows a
  # permanent OutOfSync diff against the live object.
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: mcp-gateway
      namespace: mcp-gateway
  hostnames:
    - "mcp-gateway.apps.ocp-dev.na-launch.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /mcp
      backendRefs:
        - group: agentgateway.dev
          kind: AgentgatewayBackend
          name: pfsense-mcp
          namespace: mcp-gateway
          weight: 1
    - matches:
        - path:
            type: PathPrefix
            value: /echo
      backendRefs:
        - group: agentgateway.dev
          kind: AgentgatewayBackend
          name: echo-mcp
          namespace: mcp-gateway
          weight: 1
