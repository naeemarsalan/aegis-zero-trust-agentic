# AgentgatewayPolicy: mcp-gateway-policy
#
# Attaches to HTTPRoute "mcp-route" (PostRouting phase).
# Enforces:
#   (a) JWT authentication — strict, Keycloak agentic realm, audience mcp-gateway
#   (b) extAuthz  — gRPC to kyverno-authz-server (fail-closed)
#   (c) extProc   — gRPC to ext-proc-delegation (fail-closed, request headers+body, response headers only)
#   (d) CEL RBAC  — tool-level allowlist per jwt.groups (second defense layer)
#
# Field shapes verified from:
#   agentgateway/controller/api/v1alpha1/agentgateway/agentgateway_policy_types.go  (v1.3.0-alpha.1)
#
# INFERRED fields (marked with # INFERRED) — not directly observable in the Go source
# but consistent with Envoy ext_proc/ext_authz semantics the source wraps:
#   - processingOptions.requestBodyMode, responseBodyMode — verified enum values: Buffered/None
#   - extAuth.forwardBody.maxSize — verified type ByteSize, field forwardBody
#   - extAuth.grpc.requestMetadata — verified map[string]CELExpression
#   - traffic.authorization {action, policy.matchExpressions[]} — verified from CRD
#
# The RemoteJWKS.backendRef points to a Service named "keycloak" in ns "keycloak".
# The Service must be reachable from mcp-gateway; NetworkPolicy allows this (see networkpolicies.yaml).
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: mcp-gateway-policy
  namespace: mcp-gateway
  labels:
    app.kubernetes.io/name: mcp-gateway-policy
    app.kubernetes.io/part-of: agentic-platform
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: mcp-route

  traffic:
    # -----------------------------------------------------------------------
    # (a) JWT Authentication — DISABLED (see ext-proc instead)
    #
    # agentgateway v1.3.0-alpha.1's jwtAuthentication validates the bearer
    # token and then STRIPS it, forwarding neither the token nor its claims to
    # the ext_authz / ext_proc filters (verified empirically: ext_proc receives
    # 13 headers, none the authorization header, and metadata_context is empty).
    # That breaks UC1: ext-proc-delegation needs the user's actual JWT to run
    # the RFC 8693 token exchange. Since ext-proc INDEPENDENTLY verifies the JWT
    # (signature/iss/aud/exp against the Keycloak JWKS — it is designed not to
    # trust the gateway), authentication is preserved without this filter.
    # Re-enable once agentgateway can forward the token/claims to ext_proc.
    #
    # jwtAuthentication: { ... }   # intentionally omitted

    # -----------------------------------------------------------------------
    # (b) External Authorization — gRPC Kyverno (fail-closed)
    # kyverno-authz-server implements the Envoy ext_authz gRPC protocol.
    # JWT claims are forwarded via requestMetadata under the well-known
    # "dev.agentgateway.jwt" key so Kyverno policies can inspect them.
    # forwardBody buffers request body (up to 256Ki) for policy inspection.
    # -----------------------------------------------------------------------
    extAuth:
      backendRef:
        group: ""
        kind: Service
        name: kyverno-authz-server
        namespace: kyverno
        port: 9081
      failureMode: FailClosed
      grpc:
        # Forward validated JWT claims to Kyverno for policy evaluation.
        # The "dev.agentgateway.jwt" namespace is the agentgateway standard
        # for JWT claim forwarding to ext_authz (INFERRED — follows Envoy jwt_authn metadata pattern).
        requestMetadata:
          "dev.agentgateway.jwt": "jwt.claims"
      forwardBody:
        maxSize: "262144"  # 256Ki — matches task spec maxRequestBytes

    # -----------------------------------------------------------------------
    # (c) External Processing — gRPC ext-proc-delegation (fail-closed)
    # Runs after authn+authz. Processes request headers and body (buffered),
    # response headers only (skip body to avoid double-buffering).
    # FAIL CLOSED: if ext-proc service is unreachable the request is denied.
    # processingOptions field shapes verified from ProcessingOptions struct.
    # -----------------------------------------------------------------------
    extProc:
      backendRef:
        group: ""
        kind: Service
        name: ext-proc-delegation
        namespace: mcp-gateway
        port: 9000
      processingOptions:
        requestHeaderMode: Send      # HeaderSendModeSend
        requestBodyMode: Buffered    # BodySendModeBuffered
        responseHeaderMode: Send     # HeaderSendModeSend
        responseBodyMode: None       # BodySendModeNone — skip response body

    # -----------------------------------------------------------------------
    # (d) CEL RBAC — tool-level allowlist (second defense layer)
    # After JWT validation, jwt.claims.groups is a list of group strings.
    # These rules deny requests to specific MCP tools based on group membership.
    #
    # CEL Authorization field shape: {action, policy.matchExpressions[]}
    # The "authorization" field maps to type Authorization (traffic-level).
    # INFERRED: CEL variable "jwt" contains validated claims post-jwtAuthentication.
    # -----------------------------------------------------------------------
    # Schema (verified against the agentgateway-crds 1.3.0-alpha.1 CRD):
    # authorization is a single object {action, policy.matchExpressions[]} —
    # NOT a list of named rules. For `Deny`, ANY matching expression denies.
    # Upstream caveat: a CEL expression that fails to evaluate is treated as
    # NOT matched, so a malformed Deny expression fails open. Revisit with
    # `Require` rules if that risk matters beyond the PoC.
    authorization:
      action: Deny
      policy:
        matchExpressions:
          # pfsense_* tools only for group "network-ops"
          - >-
            request.headers["mcp-tool-name"].startsWith("pfsense_") &&
            !("network-ops" in jwt.claims.groups)
          # pfsense_firewall_* tools only for group "firewall-admins"
          - >-
            request.headers["mcp-tool-name"].startsWith("pfsense_firewall_") &&
            !("firewall-admins" in jwt.claims.groups)
          # read_file tool only for group "platform-engineers"
          - >-
            request.headers["mcp-tool-name"] == "read_file" &&
            !("platform-engineers" in jwt.claims.groups)
