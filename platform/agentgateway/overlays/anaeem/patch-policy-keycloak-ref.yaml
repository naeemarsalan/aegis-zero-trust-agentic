# Patch: AgentgatewayPolicy — Keycloak JWKS backendRef for anaeem cluster.
# RHBK names its Service "keycloak-service" (HTTPS 8443). A backendRef to a
# nonexistent Service makes the controller drop the whole JWT provider and
# the proxy NACKs with "requires exactly one provider, found 0".
#
# NOTE: strategic merge patch on the first provider entry.
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: mcp-gateway-policy
  namespace: mcp-gateway
spec:
  traffic:
    jwtAuthentication:
      providers:
        - issuer: "https://keycloak.apps.anaeem.na-launch.com/realms/agentic"
          audiences:
            - mcp-gateway
          jwks:
            remote:
              jwksPath: "/realms/agentic/protocol/openid-connect/certs"
              cacheDuration: "5m"
              backendRef:
                group: ""
                kind: Service
                name: keycloak-service
                namespace: keycloak
                port: 8080  # plain-HTTP in-cluster listener (httpEnabled in keycloak CR)
