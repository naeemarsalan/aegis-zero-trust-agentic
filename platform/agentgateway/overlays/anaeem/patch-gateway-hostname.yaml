# Patch: set Gateway listener hostname for anaeem cluster
# apps domain: apps.ocp-dev.na-launch.com
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: mcp-gateway
  namespace: mcp-gateway
spec:
  listeners:
    - name: http
      protocol: HTTP
      port: 8080
      hostname: "mcp-gateway.apps.ocp-dev.na-launch.com"
      allowedRoutes:
        namespaces:
          from: Same
