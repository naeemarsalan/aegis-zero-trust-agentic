# Explicit local-path storageClass for anaeem cluster.
# The anaeem cluster has two default StorageClasses (nfs-csi and local-path).
# Always set storageClassName explicitly to avoid ambiguity.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: keycloak-db
  namespace: keycloak
spec:
  storage:
    # local-path, NOT nfs-csi: Postgres initdb hung indefinitely on NFS.
    storageClass: local-path
    size: 10Gi
