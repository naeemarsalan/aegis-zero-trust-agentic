apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# The keycloak Namespace is owned by platform/00-operators/rhbk (wave 0 needs
# it for the OLM Subscription) — do not also ship it here, the two ArgoCD apps
# fight over labels and never both reach Synced.
# Apply 00-operators/rhbk BEFORE this component so the RHBK operator is ready.
namespace: keycloak

resources:
  - cnpg-cluster.yaml
  - serving-cert-service.yaml  # mints keycloak-tls via service-ca (Option A)
  - tls-certificate.yaml   # contains only comments + Option B cert-manager stub (no-op until uncommented)
  - keycloak-cr.yaml
  - realm-import.yaml
  - network-policy.yaml

labels:
  - pairs:
      app.kubernetes.io/managed-by: kustomize
      app.kubernetes.io/part-of: nvidia-ida
      app.kubernetes.io/component: keycloak
