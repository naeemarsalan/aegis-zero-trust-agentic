# NetworkPolicies for the keycloak namespace.
# Default posture: deny all ingress, then explicitly allow only required sources.
# Egress is unrestricted (Keycloak needs to reach CNPG DB, SPIRE OIDC, etc.).

# 1. Default deny all ingress in this namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: keycloak
spec:
  podSelector: {}   # applies to all pods in namespace
  policyTypes:
    - Ingress
---
# 2. Allow ingress from the OpenShift ingress controller (router pods in
#    openshift-ingress namespace) so that the Keycloak Route/Ingress works.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-openshift-ingress
  namespace: keycloak
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              # OpenShift labels the ingress namespace; adjust if your cluster uses
              # a different label (check: oc get ns openshift-ingress --show-labels).
              kubernetes.io/metadata.name: openshift-ingress
---
# 3. Allow ingress from mcp-gateway namespace so that ext-proc / agentgateway can
#    reach Keycloak for token exchange and token introspection calls.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-mcp-gateway
  namespace: keycloak
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: mcp-gateway
---
# 4. Allow intra-namespace traffic so Keycloak pods can reach the CNPG DB service
#    and CNPG pods can reach each other (replication).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: keycloak
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}   # any pod in the same namespace
