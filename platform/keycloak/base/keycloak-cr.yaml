# Keycloak CR — deployed by the RHBK operator (stable-v26.4) from ns keycloak.
# This is OUR instance; the mta-rhbk instance in openshift-mta is separate.
#
# TLS: the Service annotation below triggers the OpenShift service-ca operator to
# inject a cluster-signed cert into secret keycloak-tls.
# For a publicly-trusted cert switch to cert-manager (see tls-certificate.yaml).
#
# Preview feature flags in additionalOptions:
#   token-exchange       — enables RFC8693 token exchange endpoint.
#                          NOTE: as of RHBK 26.2+ standard token exchange (RFC8693) is GA
#                          and does NOT require this flag.  The flag enables the LEGACY
#                          Keycloak-proprietary exchange endpoint as a fallback.
#                          Keep it enabled during PoC until the gateway ext-proc is
#                          confirmed to use the standard /token endpoint with
#                          grant_type=urn:ietf:params:oauth:grant-type:token-exchange.
#   admin-fine-grained-authz — enables per-client admin permissions; required for
#                          mcp-downstream token-exchange policy to be configured
#                          through the admin REST API.
#   Both flags are marked as preview in the Keycloak upstream docs.
#   Remove them once the standard exchange path is validated end-to-end.
apiVersion: k8s.keycloak.org/v2beta1
kind: Keycloak
metadata:
  name: keycloak
  namespace: keycloak
  annotations:
    # Trigger OpenShift service-ca to inject a signed cert into secret keycloak-tls.
    # The annotation must be on the Service, but the operator creates the Service;
    # use an additional Service annotation via the operator CR if supported,
    # or manually annotate post-install (see README.md verify section).
    service.beta.openshift.io/serving-cert-secret-name: keycloak-tls
spec:
  instances: 1   # SNO PoC — scale to 2+ for HA (requires shared DB, already present)

  db:
    vendor: postgres
    host: keycloak-db-rw          # CNPG read-write service
    port: 5432
    database: keycloak
    usernameSecret:
      name: keycloak-db-app       # auto-created by CNPG bootstrap
      key: username
    passwordSecret:
      name: keycloak-db-app
      key: password

  hostname:
    # Fixes the public frontend hostname (token `iss` stays the route URL) but
    # strict: false accepts in-cluster backchannel Hosts too, so
    # ext-proc-delegation can run RFC 8693 token exchange against the in-cluster
    # Service without a Host-mismatch 400 ("Invalid token"). strict: true with a
    # host-only hostname rejected those backchannel calls.
    hostname: keycloak.apps.ocp-dev.na-launch.com
    strict: false

  http:
    # tlsSecret intentionally OMITTED → RHBK operator switches the managed Route
    # from passthrough to EDGE termination. Rationale: the service-ca cert in
    # keycloak-tls only has SAN *.keycloak-serving-cert.keycloak.svc, which never
    # matches the public route host keycloak.apps.ocp-dev.na-launch.com — so any
    # strict-TLS OIDC client (the OpenShell gateway) fails hostname verification
    # against the passthrough route. With edge termination the OpenShift router
    # presents the ingress wildcard cert (*.apps.ocp-dev.na-launch.com, signed by
    # the ingress-operator router-CA), which DOES match the route host. Keycloak
    # keeps receiving plain HTTP on 8080 (httpEnabled below); proxy.headers
    # xforwarded preserves the https:// iss claim. To revert to a publicly-trusted
    # cert later, switch to cert-manager with a cert whose SAN includes the route
    # host and re-add tlsSecret (see tls-certificate.yaml).
    #
    # Plain-HTTP listener for IN-CLUSTER consumers (the agentgateway controller
    # fetches the realm JWKS over http). JWKS is public key material; the router
    # now terminates TLS for the external Route.
    httpEnabled: true

  proxy:
    headers: xforwarded           # trust X-Forwarded-* from OpenShift ingress

  additionalOptions:
    # token-exchange ONLY. admin-fine-grained-authz was REMOVED: on RHBK/Keycloak
    # 26.6.3 it makes the v1 (legacy) token-exchange impersonation path crash with
    # NullPointerException in UserPermissionsV2.canImpersonate (realm null) — which
    # breaks ext-proc's Option-D on-behalf exchange (requested_subject, no
    # subject_token). Without the feature, v1 impersonation uses the classic v1
    # UserPermissions and honours the realm-management `impersonation` role granted
    # to service-account-mcp-gateway. The v2 STANDARD token exchange still works via
    # the client's standard.token.exchange.enabled attribute (no fgap needed).
    - name: features
      value: "token-exchange"

  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 1Gi
