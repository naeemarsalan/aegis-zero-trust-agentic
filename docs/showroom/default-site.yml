---
site:
  title: Aegis — Zero-Trust Identity for Agentic AI
  url: https://showroom.apps.virt.na-launch.com
  start_page: modules::index.adoc

content:
  sources:
    - url: .
      start_path: content
      branches: HEAD

ui:
  bundle:
    url: https://github.com/rhpds/rhdp_showroom_theme/releases/download/v0.0.1/ui-bundle.zip
    snapshot: true

asciidoc:
  extensions:
    - asciidoctor-kroki
  attributes:
    kroki-fetch-diagram: true
    kroki-default-format: svg

runtime:
  cache_dir: ./.cache/antora

output:
  dir: ./www
