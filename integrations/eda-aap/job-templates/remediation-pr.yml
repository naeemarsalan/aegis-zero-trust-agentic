---
# job-templates/remediation-pr.yml
#
# Ansible playbook: Agent Remediation PR
#
# Triggered by the EDA rulebook when an AgentPermissionDenied alert fires.
# Steps:
#   1. Query Loki (LogQL) for the last 50 relevant log lines for the denial.
#   2. Generate a proposed remediation (RBAC Role+RoleBinding OR Kyverno
#      PolicyException) under remediations/<ts>-<ns>-<user>.yaml.
#   3. Use Gitea API to:
#       a. Create branch eda/remediation-<ts>
#       b. Commit the remediation YAML (and captured logs)
#       c. Open a PR with logs in the body, labelled "remediation"
#
# Required env vars (from AAP credential / environment/.env):
#   LOKI_PUSH_URL        e.g. http://172.16.2.252:3100
#   GITEA_URL            e.g. https://git.arsalan.io
#   GITEA_TOKEN          personal-access token with repo write scope
#   GITEA_REPO_OWNER     e.g. anaeem
#   GITEA_REPO_NAME      e.g. nvidia-ida
#
# Extra vars injected by EDA rulebook action:
#   alert_namespace, alert_tool, alert_user, alert_denial_reason,
#   alert_summary, alert_description, raw_alert_payload

- name: Generate and submit remediation PR for AgentPermissionDenied
  hosts: localhost
  gather_facts: false

  vars:
    # LOKI_PUSH_URL is the base URL (e.g. http://172.16.2.252:3100).
    # The query endpoint is on the same host/port under /loki/api/v1/query_range.
    loki_base_url: "{{ lookup('env', 'LOKI_PUSH_URL') }}"
    loki_query_url: "{{ loki_base_url }}/loki/api/v1/query_range"
    gitea_url:       "{{ lookup('env', 'GITEA_URL') }}"
    gitea_token:     "{{ lookup('env', 'GITEA_TOKEN') }}"
    gitea_owner:     "{{ lookup('env', 'GITEA_REPO_OWNER') }}"
    gitea_repo:      "{{ lookup('env', 'GITEA_REPO_NAME') }}"
    # Computed at runtime
    ts:              "{{ lookup('pipe', 'date +%Y%m%d%H%M%S') }}"
    branch_name:     "eda/remediation-{{ ts }}"
    remediation_file: "remediations/{{ ts }}-{{ alert_namespace }}-{{ alert_user }}.yaml"
    log_file:         "remediations/{{ ts }}-{{ alert_namespace }}-{{ alert_user }}-loki.txt"

  tasks:
    # ------------------------------------------------------------------
    # 1. Fetch last 50 relevant Loki log lines for the denial event
    # ------------------------------------------------------------------
    - name: Query Loki for denial context (last 50 lines)
      ansible.builtin.uri:
        url: "{{ loki_query_url }}"
        method: GET
        headers:
          Content-Type: application/json
        body_format: form-urlencoded
        body:
          # LogQL: match on namespace, user, and denial event type across all agentic namespaces
          query: >-
            {namespace="{{ alert_namespace }}"}
            |= "AgentPermissionDenied"
            |= "{{ alert_user }}"
            | json
            | line_format "{{`{{ .time }}`}} [{{`{{ .level }}`}}] {{`{{ .message }}`}}"
          limit: "50"
          direction: "backward"
          start: "{{ (ansible_date_time.epoch | int - 3600) * 1000000000 }}"
          end:   "{{ ansible_date_time.epoch | int * 1000000000 }}"
        status_code: [200]
        validate_certs: true
      register: loki_response
      ignore_errors: true   # proceed even if Loki is unreachable; log the failure
      when: loki_base_url != ""

    - name: Extract log lines from Loki response
      ansible.builtin.set_fact:
        loki_log_lines: >-
          {{
            loki_response.json.data.result
            | default([])
            | map(attribute='values')
            | flatten(levels=1)
            | map(attribute=1)
            | list
            | join('\n')
          }}
      when: loki_response is not failed and loki_response.json is defined

    - name: Set empty log lines if Loki unavailable
      ansible.builtin.set_fact:
        loki_log_lines: "Loki query failed or returned no results."
      when: loki_response is failed or loki_response.json is not defined

    # ------------------------------------------------------------------
    # 2. Generate remediation YAML
    #    Heuristic: if denial_reason contains "kyverno" or "policy" ->
    #    generate a Kyverno PolicyException; otherwise RBAC Role+RoleBinding.
    # ------------------------------------------------------------------
    - name: Generate RBAC remediation YAML
      ansible.builtin.set_fact:
        remediation_yaml: |
          ---
          # AUTO-GENERATED by EDA Agent Remediation PR job
          # Alert:     AgentPermissionDenied
          # Namespace: {{ alert_namespace }}
          # User:      {{ alert_user }}
          # Tool:      {{ alert_tool }}
          # Reason:    {{ alert_denial_reason }}
          # Timestamp: {{ ts }}
          #
          # REVIEW BEFORE MERGING: this is a proposed minimum-privilege grant.
          # Scope to the exact resource/verb required after manual audit.
          apiVersion: rbac.authorization.k8s.io/v1
          kind: Role
          metadata:
            name: agent-{{ alert_user | replace('@', '-') | replace('.', '-') }}-remediation
            namespace: {{ alert_namespace }}
            labels:
              app.kubernetes.io/managed-by: eda-remediation
              remediation-ts: "{{ ts }}"
          rules:
            - apiGroups: [""]
              resources: ["configmaps"]   # TODO: narrow to the exact resource denied
              verbs: ["get", "list"]       # TODO: narrow to the exact verb denied
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: RoleBinding
          metadata:
            name: agent-{{ alert_user | replace('@', '-') | replace('.', '-') }}-remediation
            namespace: {{ alert_namespace }}
            labels:
              app.kubernetes.io/managed-by: eda-remediation
              remediation-ts: "{{ ts }}"
          subjects:
            - kind: User
              name: "{{ alert_user }}"
              apiGroup: rbac.authorization.k8s.io
          roleRef:
            kind: Role
            name: agent-{{ alert_user | replace('@', '-') | replace('.', '-') }}-remediation
            apiGroup: rbac.authorization.k8s.io
      when: "'kyverno' not in alert_denial_reason and 'policy' not in alert_denial_reason"

    - name: Generate Kyverno PolicyException remediation YAML
      ansible.builtin.set_fact:
        remediation_yaml: |
          ---
          # AUTO-GENERATED by EDA Agent Remediation PR job
          # Alert:     AgentPermissionDenied
          # Namespace: {{ alert_namespace }}
          # User:      {{ alert_user }}
          # Tool:      {{ alert_tool }}
          # Reason:    {{ alert_denial_reason }}
          # Timestamp: {{ ts }}
          #
          # REVIEW BEFORE MERGING: narrow the match to the minimal required exception.
          apiVersion: kyverno.io/v2
          kind: PolicyException
          metadata:
            name: agent-{{ alert_user | replace('@', '-') | replace('.', '-') }}-exception
            namespace: {{ alert_namespace }}
            labels:
              app.kubernetes.io/managed-by: eda-remediation
              remediation-ts: "{{ ts }}"
          spec:
            exceptions:
              - policyName: ""        # TODO: fill in the Kyverno policy name from denial_reason
                ruleNames: []         # TODO: fill in matching rule name(s)
            match:
              any:
                - resources:
                    namespaces: ["{{ alert_namespace }}"]
                    names: []         # TODO: narrow to specific resource names
      when: "'kyverno' in alert_denial_reason or 'policy' in alert_denial_reason"

    # ------------------------------------------------------------------
    # 3. Ensure the remediations/ directory marker exists (first-time)
    # ------------------------------------------------------------------
    - name: Check if remediations/.gitkeep exists in Gitea
      ansible.builtin.uri:
        url: "{{ gitea_url }}/api/v1/repos/{{ gitea_owner }}/{{ gitea_repo }}/contents/remediations/.gitkeep"
        method: GET
        headers:
          Authorization: "token {{ gitea_token }}"
          Content-Type: application/json
        status_code: [200, 404]
        validate_certs: true
      register: gitkeep_check

    - name: Get default branch SHA for base
      ansible.builtin.uri:
        url: "{{ gitea_url }}/api/v1/repos/{{ gitea_owner }}/{{ gitea_repo }}/branches/main"
        method: GET
        headers:
          Authorization: "token {{ gitea_token }}"
          Content-Type: application/json
        status_code: [200]
        validate_certs: true
      register: main_branch

    - name: Set base_sha fact
      ansible.builtin.set_fact:
        base_sha: "{{ main_branch.json.commit.id }}"

    # ------------------------------------------------------------------
    # 4. Create the remediation branch in Gitea
    # ------------------------------------------------------------------
    - name: Create remediation branch in Gitea
      ansible.builtin.uri:
        url: "{{ gitea_url }}/api/v1/repos/{{ gitea_owner }}/{{ gitea_repo }}/branches"
        method: POST
        headers:
          Authorization: "token {{ gitea_token }}"
          Content-Type: application/json
        body_format: json
        body:
          new_branch_name: "{{ branch_name }}"
          old_branch_name: "main"
        status_code: [201, 422]   # 422 = branch already exists (idempotent)
        validate_certs: true
      register: branch_create

    # ------------------------------------------------------------------
    # 5. Commit the remediation YAML to the new branch
    # ------------------------------------------------------------------
    - name: Commit remediation YAML to Gitea branch
      ansible.builtin.uri:
        url: "{{ gitea_url }}/api/v1/repos/{{ gitea_owner }}/{{ gitea_repo }}/contents/{{ remediation_file }}"
        method: POST
        headers:
          Authorization: "token {{ gitea_token }}"
          Content-Type: application/json
        body_format: json
        body:
          message: "eda: proposed remediation for AgentPermissionDenied ns={{ alert_namespace }} user={{ alert_user }} ts={{ ts }}"
          content: "{{ remediation_yaml | b64encode }}"
          branch: "{{ branch_name }}"
          new_branch: "{{ branch_name }}"
        status_code: [201]
        validate_certs: true
      register: commit_remediation

    # ------------------------------------------------------------------
    # 6. Commit the captured Loki logs for reviewer context
    # ------------------------------------------------------------------
    - name: Commit Loki log capture to Gitea branch
      ansible.builtin.uri:
        url: "{{ gitea_url }}/api/v1/repos/{{ gitea_owner }}/{{ gitea_repo }}/contents/{{ log_file }}"
        method: POST
        headers:
          Authorization: "token {{ gitea_token }}"
          Content-Type: application/json
        body_format: json
        body:
          message: "eda: loki log capture for remediation ts={{ ts }}"
          content: "{{ loki_log_lines | b64encode }}"
          branch: "{{ branch_name }}"
        status_code: [201]
        validate_certs: true

    # ------------------------------------------------------------------
    # 7. Ensure "remediation" label exists in Gitea (idempotent)
    # ------------------------------------------------------------------
    - name: Check if remediation label exists
      ansible.builtin.uri:
        url: "{{ gitea_url }}/api/v1/repos/{{ gitea_owner }}/{{ gitea_repo }}/labels"
        method: GET
        headers:
          Authorization: "token {{ gitea_token }}"
          Content-Type: application/json
        status_code: [200]
        validate_certs: true
      register: existing_labels

    - name: Create remediation label if absent
      ansible.builtin.uri:
        url: "{{ gitea_url }}/api/v1/repos/{{ gitea_owner }}/{{ gitea_repo }}/labels"
        method: POST
        headers:
          Authorization: "token {{ gitea_token }}"
          Content-Type: application/json
        body_format: json
        body:
          name: "remediation"
          color: "#e11d48"
        status_code: [201, 422]
        validate_certs: true
      register: label_create
      when: existing_labels.json | selectattr('name', 'equalto', 'remediation') | list | length == 0

    - name: Get remediation label ID
      ansible.builtin.set_fact:
        remediation_label_id: >-
          {{
            (existing_labels.json | selectattr('name', 'equalto', 'remediation') | list | first).id
            if (existing_labels.json | selectattr('name', 'equalto', 'remediation') | list | length > 0)
            else label_create.json.id
          }}

    # ------------------------------------------------------------------
    # 8. Open the Pull Request with full context in the body
    # ------------------------------------------------------------------
    - name: Open remediation Pull Request in Gitea
      ansible.builtin.uri:
        url: "{{ gitea_url }}/api/v1/repos/{{ gitea_owner }}/{{ gitea_repo }}/pulls"
        method: POST
        headers:
          Authorization: "token {{ gitea_token }}"
          Content-Type: application/json
        body_format: json
        body:
          title: "[EDA Remediation] AgentPermissionDenied: ns={{ alert_namespace }} user={{ alert_user }} ({{ ts }})"
          head: "{{ branch_name }}"
          base: "main"
          body: |
            ## EDA Auto-Remediation Proposal

            **Alert:** `AgentPermissionDenied`
            **Namespace:** `{{ alert_namespace }}`
            **User:** `{{ alert_user }}`
            **Tool:** `{{ alert_tool }}`
            **Denial Reason:** `{{ alert_denial_reason }}`
            **Triggered at:** `{{ ts }}`

            ### Summary
            {{ alert_summary }}

            {{ alert_description }}

            ---

            ### Proposed Remediation

            See [`{{ remediation_file }}`]({{ gitea_url }}/{{ gitea_owner }}/{{ gitea_repo }}/src/branch/{{ branch_name }}/{{ remediation_file }}) in this branch.

            > **Action required:** Review the proposed RBAC Role/RoleBinding or Kyverno PolicyException.
            > Narrow the resource names and verbs to the exact denied operation before merging.
            > Merging this PR triggers the `jit-approver` webhook to record the approval in the audit log.

            ---

            ### Loki Log Capture (last 50 lines)

            <details>
            <summary>Click to expand log lines</summary>

            ```
            {{ loki_log_lines }}
            ```

            Full log file: [`{{ log_file }}`]({{ gitea_url }}/{{ gitea_owner }}/{{ gitea_repo }}/src/branch/{{ branch_name }}/{{ log_file }})
            </details>

            ---

            *Auto-generated by AAP EDA rulebook `agent-remediation`. No Slack — this PR is the notification.*
          labels:
            - "{{ remediation_label_id | int }}"
        status_code: [201]
        validate_certs: true
      register: pr_result

    - name: Print PR URL
      ansible.builtin.debug:
        msg: "Remediation PR created: {{ pr_result.json.html_url }}"

    # ------------------------------------------------------------------
    # 9. Open a Gitea issue cross-reference (optional mention)
    # ------------------------------------------------------------------
    - name: Open cross-reference Gitea issue
      ansible.builtin.uri:
        url: "{{ gitea_url }}/api/v1/repos/{{ gitea_owner }}/{{ gitea_repo }}/issues"
        method: POST
        headers:
          Authorization: "token {{ gitea_token }}"
          Content-Type: application/json
        body_format: json
        body:
          title: "[EDA] AgentPermissionDenied: {{ alert_namespace }}/{{ alert_user }} @ {{ ts }}"
          body: |
            EDA self-healing loop triggered.
            Remediation PR: {{ pr_result.json.html_url }}

            **Tool denied:** `{{ alert_tool }}`
            **Denial reason:** `{{ alert_denial_reason }}`

            Merge the PR above to unblock and record human approval via `jit-approver`.
          labels:
            - "{{ remediation_label_id | int }}"
        status_code: [201]
        validate_certs: true
      register: issue_result

    - name: Print issue URL
      ansible.builtin.debug:
        msg: "Cross-reference issue: {{ issue_result.json.html_url }}"
