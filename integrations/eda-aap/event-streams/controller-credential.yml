---
# event-streams/controller-credential.yml
#
# Reference spec for the AAP Controller credential created by setup.sh.
#
# Credential type "Red Hat Ansible Automation Platform" (was "Ansible Tower")
# is the correct type for EDA -> Controller job template invocation in AAP 2.6.
# Token-based credentials were deprecated in 2.5 and removed in 2.6.
#
# setup.sh creates this credential via:
#   POST /api/gateway/v1/credentials/
#   {
#     "name": "aap-controller-for-eda",
#     "credential_type": <id of "Red Hat Ansible Automation Platform">,
#     "inputs": {
#       "host":     "https://aap-aap.apps.hammer.na-launch.com",
#       "username": "$AAP_CONTROLLER_USERNAME",
#       "password": "$AAP_CONTROLLER_PASSWORD"
#     }
#   }
#
# The credential is then referenced by the rulebook activation so EDA can
# call back to the controller to trigger "Agent Remediation PR".

name: aap-controller-for-eda
credential_type: "Red Hat Ansible Automation Platform"
description: >
  EDA -> Controller back-channel credential.
  Allows the EDA rulebook engine to trigger job templates on the AAP
  controller when an AgentPermissionDenied alert fires.
inputs:
  host: "https://aap-aap.apps.hammer.na-launch.com"
  # username: from env AAP_CONTROLLER_USERNAME
  # password: from env AAP_CONTROLLER_PASSWORD
  # ssl_verify: true
